      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！活用を声に出して確認しよう！':'📖 活用表をもう一度確認しよう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${total}</strong> 問正解（${pct}点）</div>`;
    });
    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== FILLIN（□に一字入力） ========== */
function buildFillIn(d) {
  let cards = '';
  d.items.forEach((item, idx) => {
    let sentence = '';
    item.parts.forEach(p => {
      if (typeof p === 'string') {
        sentence += `<span>${p}</span>`;
      } else {
        sentence += `<span style="color:#C8443A;font-weight:700;">${p.red}</span>`;
      }
    });
    const boxes = item.blanks.map((_, ci) =>
      `<input class="fi-char" type="text" maxlength="1" data-idx="${idx}" data-ci="${ci}" autocomplete="off" inputmode="hiragana">`
    ).join('');
    sentence += `<span class="fi-box">${boxes}</span>`;
    if (item.suffix) sentence += `<span>${item.suffix}</span>`;
    cards += `<div class="fillin-card"><div class="sn">問 ${item.q}</div>
      <div class="fillin-sentence">${sentence}</div></div>`;
  });

  const ansRows = d.items.map(item =>
    `<div class="a-row"><span class="a-num">${item.q}</span>
    <span class="a-ans">${item.ans}</span>
    <span class="a-text">${item.note}</span></div>`
  ).join('');

  const html = `
    <div class="exp-box">${d.exp}</div>
    <div class="mondai-title">【問　題】${d.mondai}</div>
    <div class="hint-box">💡 ${d.hint}</div>
    ${cards}
    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap"><div class="ans-box">${ansRows}</div></div>`;

  setTimeout(() => {
    // Tab移動
    document.querySelectorAll('.fi-char').forEach((el, i, all) => {
      el.addEventListener('input', () => {
        if (el.value && i < all.length - 1) all[i + 1].focus();
      });
      el.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !el.value && i > 0) all[i - 1].focus();
      });
    });

    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0;
      d.items.forEach((item, idx) => {
        const inputs = document.querySelectorAll(`.fi-char[data-idx="${idx}"]`);
        const userWord = [...inputs].map(el => el.value).join('');
        const correct = item.blanks.join('');
        const ok = userWord === correct;
        if (ok) sc++;
        inputs.forEach((el, ci) => {
          el.classList.remove('ok','ng');
          if (!el.value) return;
          el.classList.add(el.value === item.blanks[ci] ? 'ok' : 'ng');
        });
      });
      const pct = Math.round(sc / d.items.length * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！呼応の副詞を確認しよう！':'📖 解説を読んでもう一度！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${d.items.length}</strong> 問正解（${pct}点）</div>`;
    });

    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== SENTSEL（文ボタンを選ぶ・複数正解） ========== */
function buildSentSel(d) {
  let ssSel = new Set();

  const buttons = d.items.map((item, idx) =>
    `<button class="sentsel-btn" data-idx="${idx}">
      <span class="sentsel-qnum">${item.q}</span>
      <span>${item.text}</span>
    </button>`
  ).join('');

  const correctIdx = d.items.map((item, i) => item.answer ? i : -1).filter(i => i >= 0);
  const ansRows = d.items.map(item =>
    `<div class="a-row" style="flex-direction:column;align-items:flex-start;gap:2px;">
      <div><span class="a-num">${item.q}</span>　
        <strong style="color:${item.answer ? '#1A4A0A' : '#9A8A6A'};">${item.answer ? '✅ 助動詞' : '❌ 形容詞'}</strong>
      </div>
      <div style="font-size:12.5px;color:#5A4A2A;padding-left:24px;">${item.note}</div>
    </div>`
  ).join('');

  const html = `
    <div class="exp-box">${d.exp}</div>
    <div class="mondai-title">【問　題】${d.mondai}</div>
    <div class="hint-box">💡 ${d.hint}</div>
    <div style="margin-bottom:12px;">${buttons}</div>
    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap"><div class="ans-box">${ansRows}</div></div>`;

  setTimeout(() => {
    document.querySelectorAll('.sentsel-btn').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx);
        if (ssSel.has(idx)) { ssSel.delete(idx); el.classList.remove('sel'); }
        else { ssSel.add(idx); el.classList.add('sel'); }
      });
    });
    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0;
      const correct = new Set(correctIdx);
      const all = new Set([...correct, ...ssSel]);
      all.forEach(idx => {
        const el = document.querySelector(`.sentsel-btn[data-idx="${idx}"]`);
        if (!el) return;
        el.classList.remove('sel','ok','ng','miss');
        if (correct.has(idx) && ssSel.has(idx)) { el.classList.add('ok'); sc++; }
        else if (correct.has(idx)) el.classList.add('miss');
        else el.classList.add('ng');
      });
      // 正解は「全正解かつ誤選択なし」で1点
      const allOk = correctIdx.every(i => ssSel.has(i)) && [...ssSel].every(i => correct.has(i));
      const pct = Math.round(sc / correctIdx.length * 100);
      const msg = allOk?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！「ぬ」に置き換えて確認しよう！':'📖 「〜ぬ」に置き換えてみよう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${correctIdx.length}</strong> 問正解（${pct}点）
        <span class="a-note-inline">🟢 助動詞で正解　🔴 誤り　薄い緑＝選び忘れ</span></div>`;
    });
    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== SENTPOS（文中赤字の品詞を選ぶ） ========== */
function buildSentPos(d) {
  let spSel = {};
  d.items.forEach((_, i) => { spSel[i] = null; });

  let cards = '';
  d.items.forEach((item, idx) => {
    const choices = d.relLabels.map(lbl =>
      `<button class="rel-choice" data-idx="${idx}" data-val="${lbl}">${lbl}</button>`
    ).join('');
    cards += `<div class="modify-card">
      <div class="sn">問 ${item.q}</div>
      <div style="font-size:14px;line-height:2.2;margin-bottom:10px;">${item.html}</div>
      <div class="rel-choice-row">${choices}</div>
    </div>`;
  });

  const ansRows = d.items.map(item =>
    `<div class="a-row"><span class="a-num">${item.q}</span>
    <span class="a-ans">${item.answer}</span>
    <span class="a-text">${item.note}</span></div>`
  ).join('');

  const html = `
    <div class="exp-box">${d.exp}</div>
    <div class="mondai-title">【問　題】${d.mondai}</div>
    <div class="hint-box">💡 ${d.hint}</div>
    ${cards}
    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap"><div class="ans-box">${ansRows}</div></div>`;

  setTimeout(() => {
    document.querySelectorAll('.rel-choice').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx), val = el.dataset.val;
        document.querySelectorAll(`.rel-choice[data-idx="${idx}"]`).forEach(c => c.classList.remove('sel'));
        if (spSel[idx] === val) { spSel[idx] = null; }
        else { spSel[idx] = val; el.classList.add('sel'); }
      });
    });
    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0;
      d.items.forEach((item, idx) => {
        const user = spSel[idx];
        document.querySelectorAll(`.rel-choice[data-idx="${idx}"]`).forEach(c => {
          c.classList.remove('sel','ok','ng');
          if (c.dataset.val === item.answer) c.classList.add('ok');
          else if (c.dataset.val === user) c.classList.add('ng');
        });
        if (user === item.answer) sc++;
      });
      const pct = Math.round(sc / d.items.length * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！終止形を確認しよう！':'📖 「い」「だ」「う段」の終わりに注目しよう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${d.items.length}</strong> 問正解（${pct}点）</div>`;
    });
    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== MULTIBLANKS（穴埋めボタン選択） ========== */
function buildMultiBlanks(d) {
  let mbSel = {};
  d.questions.forEach((q, i) => { mbSel[i] = null; });

  const qRows = d.questions.map((q, idx) => {
    const chips = q.gogun.map((v, vi) => {
      const ruby = q.ruby && q.ruby[vi] ? `<ruby>${v}<rt style="font-size:10px;">${q.ruby[vi]}</rt></ruby>` : v;
      return `<button class="mb-chip" data-idx="${idx}" data-val="${v}">${ruby}</button>`;
    }).join('');
    return `<div class="mb-q-row">
      <span class="mb-q-label">${q.q}</span>
      ${chips}
    </div>`;
  }).join('');

  const ansRows = d.questions.map(q =>
    `<div class="a-row" style="flex-direction:column;align-items:flex-start;gap:2px;">
      <div><span class="a-num">${q.q}</span>　<strong style="color:#7A5A10;">${q.answer}</strong></div>
      <div style="font-size:12.5px;color:#5A4A2A;padding-left:24px;">${q.note}</div>
    </div>`
  ).join('');

  const html = `
    <div class="exp-box">${d.exp}</div>
    <div class="mondai-title">【問　題】${d.mondai}</div>
    <div class="hint-box">💡 各行の空欄に対応するボタンをクリックして選ぼう！</div>
    <div class="mb-passage">${d.passageHtml}</div>
    ${qRows}
    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap"><div class="ans-box">${ansRows}</div></div>`;

  setTimeout(() => {
    document.querySelectorAll('.mb-chip').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx), val = el.dataset.val;
        document.querySelectorAll(`.mb-chip[data-idx="${idx}"]`).forEach(c => c.classList.remove('sel'));
        if (mbSel[idx] === val) { mbSel[idx] = null; }
        else { mbSel[idx] = val; el.classList.add('sel'); }
        // パッセージの空欄を更新
        const qNum = idx + 1;
        const blank = document.querySelector(`.mb-blank[data-q="${qNum}"]`);
        if (blank) {
          blank.textContent = mbSel[idx] ? `　${mbSel[idx]}　` : `　${d.questions[idx].q}　`;
          blank.className = 'mb-blank' + (mbSel[idx] ? ' filled' : '');
        }
      });
    });

    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0;
      d.questions.forEach((q, idx) => {
        const user = mbSel[idx];
        const ok = user === q.answer;
        document.querySelectorAll(`.mb-chip[data-idx="${idx}"]`).forEach(c => {
          c.classList.remove('sel','ok','ng');
          if (c.dataset.val === q.answer) c.classList.add('ok');
          else if (c.dataset.val === user) c.classList.add('ng');
        });
        const blank = document.querySelector(`.mb-blank[data-q="${idx+1}"]`);
        if (blank) {
          blank.classList.remove('filled','ok','ng');
          if (user) blank.classList.add(ok ? 'ok' : 'ng');
        }
        if (ok) sc++;
      });
      const pct = Math.round(sc / d.questions.length * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！':'📖 平家物語の特徴をもう一度確認しよう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${d.questions.length}</strong> 問正解（${pct}点）</div>`;
    });

    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== BLANKS7（品詞の分類① ア〜キ穴埋め） ========== */
function buildBlanks7(d) {
  let b7Vals = {}, b7Sel = null;
  d.blanks.forEach(k => { b7Vals[k] = null; });

  // Build sentence display with inline blanks
  const blockHtml = d.blocks.map(bl => {
    let s = `<div style="font-size:14px;line-height:2.5;margin-bottom:4px;padding-left:1.5em;text-indent:-1.5em;">
      <strong style="color:#8A6A1A;">${bl.label}</strong>　${bl.text}`;
    s += `<span class="b7-blank" data-key="${bl.blank}" style="display:inline-block;min-width:80px;border-bottom:2.5px solid #C8A96E;text-align:center;font-weight:500;color:#8A6A1A;cursor:pointer;padding:0 6px;border-radius:3px 3px 0 0;margin:0 2px;transition:background .12s;">${bl.blank}：　　　</span>`;
    s += bl.after;
    s += `<span class="b7-blank" data-key="${bl.blank2}" style="display:inline-block;min-width:80px;border-bottom:2.5px solid #C8A96E;text-align:center;font-weight:500;color:#8A6A1A;cursor:pointer;padding:0 6px;border-radius:3px 3px 0 0;margin:0 2px;transition:background .12s;">${bl.blank2}：　　　</span>`;
    s += bl.after2;
    if (bl.blank3) {
      s += `<span class="b7-blank" data-key="${bl.blank3}" style="display:inline-block;min-width:80px;border-bottom:2.5px solid #C8A96E;text-align:center;font-weight:500;color:#8A6A1A;cursor:pointer;padding:0 6px;border-radius:3px 3px 0 0;margin:0 2px;transition:background .12s;">${bl.blank3}：　　　</span>`;
      s += bl.after3;
    }
    s += '</div>';
    return s;
  }).join('');

  const chips = d.gogun.map(v =>
    `<button class="chip b7-chip" data-val="${v}">${v}</button>`
  ).join('');

  const ansRows = d.blanks.map(k =>
    `<div class="a-row"><span class="a-num">${k}</span><span class="a-ans">${d.answers[k]}</span></div>`
  ).join('');

  const html = `
    <div class="exp-box">${d.exp}</div>
    <div class="mondai-title">【問　題】${d.mondai}</div>
    <div class="hint-box">💡 空欄をクリックして選択 → 語群をクリックして埋める。もう一度空欄をクリックで解除。</div>
    <div class="prob-items" style="margin-bottom:10px;">
      ${blockHtml}
      <div class="gogun-label" style="margin-top:10px;">（語群）</div>
      <div class="chip-row">${chips}</div>
      <div class="gogun-hint">① 空欄をクリック（選択）→ ② 語群をクリック</div>
    </div>
    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap">
      <div class="ans-box">
        ${ansRows}
        <div class="a-row" style="flex-direction:column;gap:4px;align-items:flex-start;margin-top:4px;">
          <span style="font-size:13px;line-height:2;">${d.note}</span>
        </div>
      </div>
    </div>`;

  setTimeout(() => {
    document.querySelectorAll('.b7-blank').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.b7-blank').forEach(b => b.style.background = '');
        b7Sel = el.dataset.key;
        el.style.background = '#F5EDDA';
      });
    });
    document.querySelectorAll('.b7-chip').forEach(el => {
      el.addEventListener('click', () => {
        if (!b7Sel) return;
        b7Vals[b7Sel] = el.dataset.val;
        const b = document.querySelector(`.b7-blank[data-key="${b7Sel}"]`);
        if (b) { b.textContent = b7Sel + '：' + el.dataset.val; b.style.background = ''; b.style.color = '#2C2C2A'; }
        b7Sel = null;
      });
    });
    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0;
      d.blanks.forEach(k => {
        const b = document.querySelector(`.b7-blank[data-key="${k}"]`);
        if (!b) return;
        const u = b7Vals[k];
        const alts = d.altAnswers && d.altAnswers[k];
        const ok = alts ? alts.includes(u) : (u === d.answers[k]);
        b.style.background = '';
        if (!u) return;
        if (ok) { b.style.background = '#EAF3DE'; b.style.borderColor = '#3B6D11'; b.style.color = '#1A4A0A'; sc++; }
        else { b.style.background = '#FCEBEB'; b.style.borderColor = '#A32D2D'; b.style.color = '#A32D2D'; }
      });
      const pct = Math.round(sc / d.blanks.length * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！':'📖 品詞の分類表をもう一度確認しよう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${d.blanks.length}</strong> 問正解（${pct}点）</div>`;
    });
    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== HINSHU3（品詞の分類③ 品詞名選択） ========== */
function buildHinshu3(d) {
  let h3Sel = {};
  d.items.forEach((_, i) => { h3Sel[i] = null; });

  let cards = '';
  d.items.forEach((item, idx) => {
    const choices = d.relLabels.map(lbl =>
      `<button class="rel-choice" data-idx="${idx}" data-val="${lbl}">${lbl}</button>`
    ).join('');
    cards += `<div class="modify-card">
      <div class="sn">問 ${item.q}</div>
      <div style="font-size:14px;font-weight:500;color:#2C2C2A;margin-bottom:10px;line-height:2;">${item.words}</div>
      <div class="rel-choice-row">${choices}</div>
    </div>`;
  });

  const ansRows = d.items.map(item =>
    `<div class="a-row"><span class="a-num">${item.q}</span>
    <span class="a-ans">${item.answer}</span>
    <span class="a-text">${item.note}</span></div>`
  ).join('');

  const html = `
    <div class="exp-box">${d.exp}</div>
    <div class="mondai-title">【問　題】${d.mondai}</div>
    <div class="hint-box">💡 ${d.hint}</div>
    ${cards}
    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap"><div class="ans-box">${ansRows}</div></div>`;

  setTimeout(() => {
    document.querySelectorAll('.rel-choice').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx), val = el.dataset.val;
        document.querySelectorAll(`.rel-choice[data-idx="${idx}"]`).forEach(c => c.classList.remove('sel'));
        if (h3Sel[idx] === val) { h3Sel[idx] = null; }
        else { h3Sel[idx] = val; el.classList.add('sel'); }
      });
    });
    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0;
      d.items.forEach((item, idx) => {
        const user = h3Sel[idx];
        document.querySelectorAll(`.rel-choice[data-idx="${idx}"]`).forEach(c => {
          c.classList.remove('sel','ok','ng');
          if (c.dataset.val === item.answer) c.classList.add('ok');
          else if (c.dataset.val === user) c.classList.add('ng');
        });
        if (user === item.answer) sc++;
      });
      const pct = Math.round(sc / d.items.length * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！':'📖 言い切りの形をもう一度確認しよう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${d.items.length}</strong> 問正解（${pct}点）</div>`;
    });
    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== LITSEL ========== */
function buildLitSel(d) {
  let litSel = {};
  d.items.forEach((_, i) => { litSel[i] = new Set(); });

  let cards = '';
  d.items.forEach((item, idx) => {
    let sentence = '';
    item.segments.forEach(seg => {
      if (seg.chip) {
        sentence += `<button class="litsel-chip" data-idx="${idx}" data-ci="${seg.idx}">${seg.text}</button>`;
      } else {
        sentence += `<span class="litsel-text">${seg.text}</span>`;
      }
    });
    cards += `<div class="litsel-card">
      <div class="sn">問 ${item.q}</div>
      <div class="litsel-sentence">${sentence}</div>
      <div class="litsel-source">${item.source}</div>
    </div>`;
  });

  const ansRows = d.items.map(item => {
    const answerChips = item.answers.map(ai => {
      const seg = item.segments.find(s => s.chip && s.idx === ai);
      return seg ? `<strong style="color:#1A4A0A;background:#EAF3DE;padding:1px 8px;border-radius:4px;">${seg.text}</strong>` : '';
    }).join('　');
    return `<div class="a-row" style="flex-direction:column;align-items:flex-start;gap:3px;">
      <div><span class="a-num">${item.q}</span>　付属語：${answerChips}</div>
      <div style="font-size:12.5px;color:#5A4A2A;padding-left:24px;">${item.note}</div>
    </div>`;
  }).join('');

  const totalQ = d.items.length;

  const html = `
    <div class="exp-box">${d.exp}</div>
    <div class="mondai-title">【問　題】${d.mondai}</div>
    <div class="hint-box">💡 ${d.hint}</div>
    ${cards}
    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap"><div class="ans-box">${ansRows}</div></div>`;

  setTimeout(() => {
    document.querySelectorAll('.litsel-chip').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx), ci = parseInt(el.dataset.ci);
        if (litSel[idx].has(ci)) { litSel[idx].delete(ci); el.classList.remove('sel'); }
        else { litSel[idx].add(ci); el.classList.add('sel'); }
      });
    });

    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0;
      d.items.forEach((item, idx) => {
        const correct = new Set(item.answers);
        const user = litSel[idx];
        const allOk = item.answers.every(c => user.has(c)) && [...user].every(c => correct.has(c));
        if (allOk) sc++;
        const all = new Set([...correct, ...user]);
        all.forEach(ci => {
          const el = document.querySelector(`.litsel-chip[data-idx="${idx}"][data-ci="${ci}"]`);
          if (!el) return;
          el.classList.remove('sel','ok','ng','miss');
          if (correct.has(ci) && user.has(ci)) el.classList.add('ok');
          else if (correct.has(ci)) el.classList.add('miss');
          else el.classList.add('ng');
        });
      });
      const pct = Math.round(sc / totalQ * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！':'📖 助詞・助動詞をもう一度確認しよう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${totalQ}</strong> 問正解（${pct}点）
        <span class="a-note-inline">🟢 正解　🔴 誤り　薄い緑＝選び忘れ</span></div>`;
    });

    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== WORDSEL ========== */
function buildWordSel(d) {
  // sel[partKey][idx] = Set of selected word indices
  const sel = { p1:{}, p2:{} };
  d.part1.items.forEach((_, i) => { sel.p1[i] = new Set(); });
  if (d.part2) d.part2.items.forEach((_, i) => { sel.p2[i] = new Set(); });

  function buildPart(part, partKey) {
    let cards = '';
    part.items.forEach((item, idx) => {
      const chips = item.words.map((w, wi) =>
        `<button class="wchip" data-pk="${partKey}" data-idx="${idx}" data-wi="${wi}">${w}</button>`
      ).join('');
      cards += `<div class="wordsel-card">
        <div class="sn">問 ${item.q}</div>
        <div class="wordsel-display">${item.display}</div>
        <div class="wchip-row">${chips}</div>
      </div>`;
    });
    const ansRows = part.items.map(item =>
      `<div class="a-row"><span class="a-num">${item.q}</span>
      <span class="a-text"><strong>${item.answers.map(i => item.words[i]).join('　')}</strong>
      <span class="a-note">・${item.note}</span></span></div>`
    ).join('');
    return { cards, ansRows };
  }

  const p1 = buildPart(d.part1, 'p1');
  const p2 = d.part2 ? buildPart(d.part2, 'p2') : null;

  const totalItems = d.part1.items.length + (d.part2 ? d.part2.items.length : 0);

  const html = `
    <div class="exp-box">${d.exp}</div>

    <div class="mondai-title" style="margin-top:6px;">【${d.part1.label}】${d.part1.intro}</div>
    <div class="hint-box">💡 ${d.part2 ? '自立語と思う単語をクリックして選ぼう。' : '活用する単語をクリックして選ぼう。'}もう一度クリックで取り消し。</div>
    ${p1.cards}

    ${d.part2 ? `<div class="mondai-title" style="margin-top:14px;">【${d.part2.label}】${d.part2.intro}</div>
    <div class="hint-box">💡 付属語と思う単語をクリックして選ぼう。もう一度クリックで取り消し。</div>
    ${p2.cards}` : ''}

    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap">
      <div class="ans-box">
        ${d.part2 ? `<div style="font-weight:700;color:#7A5A10;padding:6px 0 4px;">【問題１】自立語</div>` : ''}
        ${p1.ansRows}
        ${d.part2 ? `<div style="font-weight:700;color:#7A5A10;padding:12px 0 4px;">【問題２】付属語</div>
        ${p2.ansRows}` : ''}
      </div>
    </div>`;

  setTimeout(() => {
    // chip click
    document.querySelectorAll('.wchip').forEach(el => {
      el.addEventListener('click', () => {
        const pk = el.dataset.pk, idx = parseInt(el.dataset.idx), wi = parseInt(el.dataset.wi);
        if (sel[pk][idx].has(wi)) { sel[pk][idx].delete(wi); el.classList.remove('sel'); }
        else { sel[pk][idx].add(wi); el.classList.add('sel'); }
      });
    });

    // scoring
    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0;

      function scorePart(part, partKey) {
        part.items.forEach((item, idx) => {
          const correct = new Set(item.answers);
          const user = sel[partKey][idx];
          const allOk = item.answers.every(w => user.has(w)) && [...user].every(w => correct.has(w));
          if (allOk) sc++;
          const all = new Set([...correct, ...user]);
          all.forEach(wi => {
            const el = document.querySelector(`.wchip[data-pk="${partKey}"][data-idx="${idx}"][data-wi="${wi}"]`);
            if (!el) return;
            el.classList.remove('sel','ok','ng','miss');
            if (correct.has(wi) && user.has(wi)) el.classList.add('ok');
            else if (correct.has(wi)) el.classList.add('miss');
            else el.classList.add('ng');
          });
        });
      }

      scorePart(d.part1, 'p1');
      if (d.part2) scorePart(d.part2, 'p2');

      const pct = Math.round(sc / totalItems * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！':'📖 自立語・付属語の違いをもう一度確認しよう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${totalItems}</strong> 問正解（${pct}点）
        <span class="a-note-inline">🟢 正解　🔴 誤り　薄い緑＝選び忘れ</span></div>`;
    });

    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== FILLSELECT ========== */
function buildFillSelect(d) {
  let fsVals = {}, fsSelBlank = null;
  d.sentences.forEach((_, i) => { fsVals[i] = null; });

  const compareBox = d.compareBox ? `
    <div class="compare-box">
      <div>【ア】　${d.compareBox.a}</div>
      <div class="arrow">↓</div>
      <div>【イ】　${d.compareBox.b}</div>
    </div>` : '';

  const sentenceRows = d.sentences.map(s =>
    `<div class="fillselect-sentence">
      <span>${s.before}</span>
      <span class="fs-blank" data-idx="${s.blankIdx}">　　　　</span>
      <span>${s.after}</span>
    </div>`
  ).join('');

  const chips = d.gogun.map(v =>
    `<button class="chip fs-chip" data-val="${v}">${v}</button>`
  ).join('');

  const ansRows = d.answers.map((a, i) =>
    `<div class="a-row"><span class="a-num">${i===0?'１つ目':'２つ目'}</span><span class="a-ans">${a}</span></div>`
  ).join('');

  const html = `
    <div class="exp-box">${d.exp}</div>
    <div class="mondai-title">【問　題】次の（　）に当てはまるものを，①～④の中からそれぞれ選びましょう。</div>
    <div class="fillselect-passage">
      ${d.intro}
      ${compareBox}
      ${sentenceRows}
      <div>${d.suffix}</div>
    </div>
    <div class="prob-items">
      <div class="gogun-label">（語群）</div>
      <div class="chip-row">${chips}</div>
      <div class="gogun-hint">① 空欄をクリック → ② 語群から選んでクリック</div>
    </div>
    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap">
      <div class="ans-box">
        ${ansRows}
        <div class="a-row" style="flex-direction:column;align-items:flex-start;gap:4px;margin-top:4px;">
          <span style="font-size:13px;line-height:2;color:#2C2C2A;">${d.note}</span>
        </div>
      </div>
    </div>`;

  setTimeout(() => {
    document.querySelectorAll('.fs-blank').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.fs-blank').forEach(b => b.classList.remove('sel'));
        fsSelBlank = parseInt(el.dataset.idx);
        el.classList.add('sel');
      });
    });
    document.querySelectorAll('.fs-chip').forEach(el => {
      el.addEventListener('click', () => {
        if (fsSelBlank === null) return;
        fsVals[fsSelBlank] = el.dataset.val;
        const b = document.querySelector(`.fs-blank[data-idx="${fsSelBlank}"]`);
        if (b) { b.textContent = el.dataset.val; b.classList.remove('sel','ok','ng'); b.classList.add('filled'); }
        fsSelBlank = null;
      });
    });
    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0;
      d.answers.forEach((ans, i) => {
        const b = document.querySelector(`.fs-blank[data-idx="${i}"]`);
        if (!b) return;
        b.classList.remove('sel','filled','ok','ng');
        const u = fsVals[i];
        if (!u) { b.classList.add('filled'); return; }
        if (u === ans) { b.classList.add('ok'); sc++; }
        else { b.classList.add('ng'); }
      });
      const pct = Math.round(sc / d.answers.length * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=50?'💪 もう少し！品詞の特徴を確認しよう！':'📖 解説をよく読んでもう一度チャレンジ！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${d.answers.length}</strong> 問正解（${pct}点）</div>`;
    });
    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== CHOOSE ========== */
function buildChoose(d) {
  let chooseSel = {};
  d.items.forEach((_, i) => { chooseSel[i] = null; });

  let cards = '';
  d.items.forEach((item, idx) => {
    const opts = item.options.map((opt, oi) =>
      `<div class="choose-option" data-idx="${idx}" data-label="${opt.label}">
        <span class="choose-label">${opt.label}</span>
        <span>${opt.text}</span>
      </div>`
    ).join('');
    cards += `<div class="choose-card"><div class="sn">問 ${item.q}</div>${item.title ? `<div style="font-size:14px;font-weight:500;color:#2C2C2A;margin-bottom:10px;line-height:1.75;border-left:3px solid #C8A96E;padding-left:8px;">${item.title}</div>` : ''}${opts}</div>`;
  });

  const ansRows = d.items.map(item => {
    const noteLines = item.options.map((opt, oi) =>
      `<div style="margin:4px 0;font-size:13px;line-height:1.85;padding-left:1px;">
        <span style="font-weight:700;color:${opt.label===item.answer?'#1A4A0A':'#9A8A6A'};">${opt.label}</span>
        　${item.notes[oi]}
      </div>`
    ).join('');
    return `<div class="a-row" style="flex-direction:column;gap:2px;align-items:flex-start;">
      <div><span class="a-num" style="font-size:13px;">${item.q}</span>　
      <strong style="color:#7A5A10;">正解：${item.answer}</strong></div>
      ${noteLines}
    </div>`;
  }).join('');

  const html = `
    <div class="exp-box">${d.exp}</div>
    <div class="mondai-title">【問　題】${d.mondai}</div>
    <div class="hint-box">💡 ${d.hint}</div>
    ${cards}

    <div class="ans-wrap" id="ans-wrap"><div class="ans-box">${ansRows}</div></div>`;

  setTimeout(() => {
    document.querySelectorAll('.choose-option').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx), lbl = el.dataset.label;
        document.querySelectorAll(`.choose-option[data-idx="${idx}"]`).forEach(e => e.classList.remove('sel'));
        if (chooseSel[idx] === lbl) { chooseSel[idx] = null; }
        else { chooseSel[idx] = lbl; el.classList.add('sel'); }
      });
    });

    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0;
      d.items.forEach((item, idx) => {
        const user = chooseSel[idx];
        document.querySelectorAll(`.choose-option[data-idx="${idx}"]`).forEach(el => {
          el.classList.remove('sel','ok','ng','miss');
          const lbl = el.dataset.label;
          if (lbl === item.answer) {
            if (user === lbl) { el.classList.add('ok'); sc++; }
            else el.classList.add('miss');
          } else {
            if (user === lbl) el.classList.add('ng');
          }
        });
      });
      const pct = Math.round(sc / d.items.length * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！':'📖 指示語と接続詞の違いをもう一度確認しよう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${d.items.length}</strong> 問正解（${pct}点）
        <span class="a-note-inline">🟢 正解　🔴 誤り　薄い緑＝正解を選び忘れ</span></div>`;

    document.getElementById('tog-btn').addEventListener('click', function() {

      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== RELTYPE ========== */
function buildRelType(d) {
  let relSel = {};
  d.items.forEach((_, i) => { relSel[i] = null; });

  // 解説：４関係
  const relExp = d.relationsExp.map(r => `
    <div style="margin-bottom:10px;padding-left:4px;">
      <div style="font-weight:700;color:#8A6A1A;font-size:14px;margin-bottom:2px;">${r.label}　${r.name}</div>
      <div style="font-size:12.5px;color:#5A4A2A;margin-bottom:3px;">${r.desc}</div>
      <div style="font-size:13px;color:#6A5A30;padding-left:1em;">（例）${r.examples.join('　／　')}</div>
    </div>`).join('');

  // 問題カード
  let cards = '';
  d.items.forEach((item, idx) => {
    const chips = item.parts.map((p, pi) =>
      item.targets.includes(pi)
        ? `<span class="mfchip target">${p}</span>`
        : `<span class="mfchip" style="cursor:default;">${p}</span>`
    ).join('');
    const choices = d.relLabels.map((lbl, li) => {
      const val = ['ア','イ','ウ','エ'][li];
      return `<button class="rel-choice" data-idx="${idx}" data-val="${val}">${lbl}</button>`;
    }).join('');
    cards += `<div class="modify-card">
      <div class="sn">問 ${item.q}</div>
      <div class="modify-row" style="margin-bottom:10px;">${chips}</div>
      <div class="rel-choice-row">${choices}</div>
    </div>`;
  });

  // 解答
  const ansRows = d.items.map(item =>
    `<div class="a-row"><span class="a-num">${item.q}</span>
    <span class="a-ans">${item.answer}</span>
    <span class="a-text">${item.note}</span></div>`
  ).join('');

  const html = `
    <div class="exp-box">
      <div style="margin-bottom:10px;">${d.exp}</div>
      <div style="border-left:4px solid #C8A96E;padding-left:14px;">${relExp}</div>
    </div>
    <div class="mondai-title">【問　題】${d.mondai}</div>
    <div class="hint-box">💡 ${d.hint}</div>
    ${cards}
    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap"><div class="ans-box">${ansRows}</div></div>`;

  setTimeout(() => {
    document.querySelectorAll('.rel-choice').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx), val = el.dataset.val;
        document.querySelectorAll(`.rel-choice[data-idx="${idx}"]`).forEach(c => c.classList.remove('sel'));
        if (relSel[idx] === val) { relSel[idx] = null; }
        else { relSel[idx] = val; el.classList.add('sel'); }
      });
    });
    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0;
      d.items.forEach((item, idx) => {
        const user = relSel[idx];
        document.querySelectorAll(`.rel-choice[data-idx="${idx}"]`).forEach(c => {
          c.classList.remove('sel','ok','ng');
          if (c.dataset.val === item.answer) c.classList.add('ok');
          else if (c.dataset.val === user) c.classList.add('ng');
        });
        if (user === item.answer) sc++;
      });
      const pct = Math.round(sc / d.items.length * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！':'📖 解説をもう一度読んでみよう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${d.items.length}</strong> 問正解（${pct}点）</div>`;
    });

      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== LANGUNIT ========== */
function buildLangUnit(d) {
  // State
  let p1Sel = null;
  let p2CutSel = new Set();
  let p2CountSel = null;

  // --- 解説：５段階ピラミッド ---
  const unitRows = d.units.map((u, i) => {
    const indent = i * 14;
    const size = 15 - i * 0.5;
    return `<div style="padding-left:${indent}px;font-size:${size}px;line-height:2;color:#2C2C2A;">
      <span style="display:inline-block;min-width:54px;font-weight:700;color:#8A6A1A;">【${u.name}】</span>
      <span style="font-size:13px;color:#5A4A2A;">${u.desc}</span>
    </div>`;
  }).join('');

  // --- 問題1 ---
  const g1chips = d.part1.gogun.map(v =>
    `<button class="chip" data-part="1" data-val="${v}">${v}</button>`
  ).join('');
  const p1AnsLines = d.part1.ansLines.map(l =>
    `<div style="font-size:13px;line-height:1.9;color:#2C2C2A;padding:3px 0;">${l}</div>`
  ).join('');

  // --- 問題2: SPLIT-like with 。 ---
  const chars2 = [...d.part2.text];
  let splitLine = '';
  chars2.forEach((ch, ci) => {
    splitLine += `<span class="s-ch">${ch}</span>`;
    if (ci < chars2.length - 1 && ch !== '。') {
      // Only show gap if next is not already a 。 position in the original last sentence
      splitLine += `<span class="s-gap lu-gap" data-pos="${ci}">。</span>`;
    }
  });
  const g2chips = d.part2.gogun.map(v =>
    `<button class="chip" data-part="2" data-val="${v}">${v}</button>`
  ).join('');
  const p2AnsLines = d.part2.ansLines.map(l =>
    `<div style="font-size:13px;line-height:1.9;color:#2C2C2A;padding:3px 0;">${l}</div>`
  ).join('');

  const html = `
    <div class="exp-box">
      <div style="margin-bottom:10px;">${d.exp}</div>
      <div style="background:#FBF7EE;border-left:4px solid #C8A96E;padding:10px 14px;border-radius:0 6px 6px 0;">
        ${unitRows}
      </div>
    </div>

    <!-- 問題1 -->
    <div class="mondai-title" style="margin-top:6px;">【${d.part1.label}】${d.part1.intro}</div>
    <div class="prob-items" style="margin-bottom:10px;">
      <div style="font-size:13.5px;line-height:2.1;color:#2C2C2A;background:#FAFAF8;border-radius:6px;padding:10px 14px;">${d.part1.passage}</div>
      <div style="font-size:12px;color:#9A8A6A;margin-top:4px;padding-left:4px;">${d.part1.source}</div>
      <div class="gogun-label" style="margin-top:14px;">いくつの文からできていますか？</div>
      <div class="chip-row" id="g1-chips">${g1chips}</div>
      <div id="p1-sel-show" style="font-size:13px;color:#8A6A1A;margin-top:4px;min-height:20px;"></div>
    </div>

    <!-- 問題2 -->
    <div class="mondai-title">【${d.part2.label}】${d.part2.intro}</div>
    <div class="hint-box">💡 文の終わりと思う場所をクリックして「。」を入れよう。もう一度クリックで取り消し。最後の文には「。」が付いています。</div>
    <div class="prob-items" style="margin-bottom:10px;">
      <div class="split-line" style="font-size:14px;line-height:2.2;">${splitLine}</div>
      <div style="font-size:12px;color:#9A8A6A;margin-top:8px;padding-left:4px;">${d.part2.source}</div>
      <div class="gogun-label" style="margin-top:14px;">いくつの文からできていますか？</div>
      <div class="chip-row" id="g2-chips">${g2chips}</div>
      <div id="p2-sel-show" style="font-size:13px;color:#8A6A1A;margin-top:4px;min-height:20px;"></div>
    </div>

    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap">
      <div class="ans-box">
        <div class="a-row" style="flex-direction:column;gap:4px;">
          <div style="font-weight:700;color:#7A5A10;margin-bottom:4px;">【問題１】${d.part1.answer}</div>
          ${p1AnsLines}
        </div>
        <div class="a-row" style="flex-direction:column;gap:4px;margin-top:10px;">
          <div style="font-weight:700;color:#7A5A10;margin-bottom:4px;">【問題２】${d.part2.answer}</div>
          ${p2AnsLines}
        </div>
      </div>
    </div>`;

  setTimeout(() => {
    // --- 問題1 chip selection ---
    document.querySelectorAll('.chip[data-part="1"]').forEach(el => {
      el.addEventListener('click', () => {
        p1Sel = el.dataset.val;
        document.getElementById('p1-sel-show').textContent = '選択中：' + p1Sel;
        document.querySelectorAll('.chip[data-part="1"]').forEach(c => c.style.background = '');
        el.style.background = '#F5EDDA';
      });
    });

    // --- 問題2 gap clicks ---
    document.querySelectorAll('.lu-gap').forEach(el => {
      el.addEventListener('click', () => {
        const pos = parseInt(el.dataset.pos);
        if (p2CutSel.has(pos)) { p2CutSel.delete(pos); el.classList.remove('on'); }
        else { p2CutSel.add(pos); el.classList.add('on'); }
      });
    });

    // --- 問題2 chip selection ---
    document.querySelectorAll('.chip[data-part="2"]').forEach(el => {
      el.addEventListener('click', () => {
        p2CountSel = el.dataset.val;
        document.getElementById('p2-sel-show').textContent = '選択中：' + p2CountSel;
        document.querySelectorAll('.chip[data-part="2"]').forEach(c => c.style.background = '');
        el.style.background = '#F5EDDA';
      });
    });

    // --- 採点 ---
    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0, total = 2;

      // 問題1採点
      const p1ok = p1Sel === d.part1.answer;
      if (p1ok) sc++;
      document.querySelectorAll('.chip[data-part="1"]').forEach(c => {
        if (c.dataset.val === d.part1.answer) c.style.background = '#EAF3DE';
        else if (c.dataset.val === p1Sel && !p1ok) c.style.background = '#FCEBEB';
      });

      // 問題2 句点採点
      const correct2 = new Set(d.part2.cuts);
      let gapOk = 0, gapTotal = correct2.size;
      const all2 = new Set([...correct2, ...p2CutSel]);
      all2.forEach(pos => {
        const el = document.querySelector('.lu-gap[data-pos="'+pos+'"]');
        if (!el) return;
        el.classList.remove('on','ok','ng','miss');
        if (correct2.has(pos) && p2CutSel.has(pos)) { el.classList.add('ok'); gapOk++; }
        else if (correct2.has(pos)) el.classList.add('miss');
        else el.classList.add('ng');
      });
      const p2CountOk = p2CountSel === d.part2.answer;
      const p2ok = gapOk === gapTotal && p2CountOk;
      if (p2ok) sc++;
      document.querySelectorAll('.chip[data-part="2"]').forEach(c => {
        if (c.dataset.val === d.part2.answer) c.style.background = '#EAF3DE';
        else if (c.dataset.val === p2CountSel && !p2CountOk) c.style.background = '#FCEBEB';
      });

      const pct = Math.round(sc / total * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=50?'💪 もう少し！正解を確認しよう！':'📖 解説をよく読んでもう一度！';
      const gapMsg = `（句点の位置：${gapOk}/${gapTotal}か所正解）`;
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${total}</strong> 問正解（${pct}点）<span class="a-note-inline">${gapMsg}　🟢 正解　🔴 誤り　薄い緑＝付け忘れ</span></div>`;
    });

    // --- 解答表示 ---
    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== MODREV ========== */
function buildModRev(d) {
  modRevSel = {};
  d.items.forEach((_, i) => { modRevSel[i] = null; });

  let cards = '';
  d.items.forEach((item, idx) => {
    let chips = '';
    item.parts.forEach((p, pi) => {
      if (pi === item.src) {
        // 赤字（選択不可、修飾語側）
        chips += `<span class="mfchip target">${p}</span>`;
      } else {
        // 選択可能な文節
        chips += `<span class="mrchip clickable" data-idx="${idx}" data-pi="${pi}">${p}</span>`;
      }
    });
    cards += `<div class="modify-card"><div class="sn">問 ${item.q}</div><div class="modify-row">${chips}</div></div>`;
  });

  const ansRows = d.items.map(item =>
    `<div class="a-row"><span class="a-num">${item.q}</span>
    <span class="a-text">
      <span style="color:#C8443A;font-weight:700;">${item.parts[item.src]}</span>
      　→　<strong>${item.parts[item.answer]}</strong>
      <span class="a-note">・${item.note}</span>
    </span></div>`
  ).join('');

  const html = `
    <div class="exp-box">${d.exp}</div>
    <div class="mondai-title">【問　題】${d.mondai}</div>
    <div class="hint-box">💡 ${d.hint}</div>
    ${cards}
    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap"><div class="ans-box">${ansRows}</div></div>`;

  setTimeout(() => {
    document.querySelectorAll('.mrchip.clickable').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx), pi = parseInt(el.dataset.pi);
        // 同じ問題の選択を解除
        document.querySelectorAll('.mrchip[data-idx="'+idx+'"]').forEach(e => e.classList.remove('sel'));
        if (modRevSel[idx] === pi) {
          modRevSel[idx] = null;
        } else {
          modRevSel[idx] = pi;
          el.classList.add('sel');
        }
      });
    });

    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0;
      d.items.forEach((item, idx) => {
        const user = modRevSel[idx];
        document.querySelectorAll('.mrchip[data-idx="'+idx+'"]').forEach(el => {
          el.classList.remove('sel','ok','ng');
        });
        if (user === null) return;
        const el = document.querySelector('.mrchip[data-idx="'+idx+'"][data-pi="'+user+'"]');
        if (!el) return;
        if (user === item.answer) { el.classList.add('ok'); sc++; }
        else {
          el.classList.add('ng');
          // 正解を薄くハイライト
          const correct = document.querySelector('.mrchip[data-idx="'+idx+'"][data-pi="'+item.answer+'"]');
          if (correct) correct.classList.add('miss');
        }
      });
      const pct = Math.round(sc / d.items.length * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！':'📖 赤字がどこにかかるか，もう一度考えてみよう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${d.items.length}</strong> 問正解（${pct}点）</div>`;
    });

    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

            else el.classList.add('miss');

        });
      });
      const pct = Math.round(sc / d.items.length * 100);

    });

}

/* ========== KOJIFILL ========== */
function buildKojiFill(d) {
  let kojiFillSel = {};
  d.items.forEach((_, i) => { kojiFillSel[i] = null; });

  const legend = d.choices.map(c =>
    `<div class="kj-legend-item"><span class="kj-legend-lbl">${c.label}</span><strong>${c.name}</strong>（${c.text}）</div>`
  ).join('');

  let cards = '';
  d.items.forEach((item, idx) => {
    const txt = item.text.replace('（　　　　　　　）',
      `<span class="kj-blank" id="kj-blank-${idx}">（　　　　　）</span>`);
    const chips = d.choices.map(c =>
      `<button class="kj-chip" data-idx="${idx}" data-val="${c.label}">${c.label}</button>`
    ).join('');
    cards += `<div class="kj-fill-card">
      <div class="kj-fill-num">問${item.q}</div>
      <div class="kj-fill-text">${txt}</div>
      <div class="kj-chips">${chips}</div>
    </div>`;
  });

  const ansRows = d.items.map(item => {
    const ch = d.choices.find(c => c.label === item.answer);
    return `<div class="a-row">
      <span class="a-num">${item.q}</span>
      <span class="a-ans">${item.answer}</span>
      <span class="a-text">${ch ? ch.name : ''}（${ch ? ch.text : ''}）
        <span class="a-note">・${item.note}</span>
      </span>
    </div>`;
  }).join('');

  const html = `
    <div class="exp-box">${d.exp}</div>
    <div class="mondai-title">【問　題】${d.mondai}</div>
    <div class="hint-box">💡 ${d.hint}</div>
    <div class="kj-choice-legend">${legend}</div>
    ${cards}
    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap"><div class="ans-box">${ansRows}</div></div>`;

  setTimeout(() => {
    document.querySelectorAll('.kj-chip').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx), val = el.dataset.val;
        document.querySelectorAll(`.kj-chip[data-idx="${idx}"]`).forEach(e => e.classList.remove('sel'));
        const blank = document.getElementById('kj-blank-'+idx);
        if (kojiFillSel[idx] === val) {
          kojiFillSel[idx] = null;
          if (blank) { blank.textContent = '（　　　　　）'; blank.style.color=''; blank.style.fontWeight=''; }
        } else {
          kojiFillSel[idx] = val; el.classList.add('sel');
          const ch = d.choices.find(c => c.label === val);
          if (blank && ch) { blank.textContent = '（'+ch.name+'）'; blank.style.color='#7A5A10'; blank.style.fontWeight='700'; }
        }
      });
    });
    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0;
      d.items.forEach((item, idx) => {
        const user = kojiFillSel[idx];
        document.querySelectorAll(`.kj-chip[data-idx="${idx}"]`).forEach(el => {
          el.classList.remove('sel','ok','ng','miss');
          if (el.dataset.val === item.answer) {
            if (user === item.answer) { el.classList.add('ok'); sc++; }
            else el.classList.add('miss');
          } else if (el.dataset.val === user) { el.classList.add('ng'); }
        });
        const blank = document.getElementById('kj-blank-'+idx);
        const ch = d.choices.find(c => c.label === item.answer);
        if (blank) {
          blank.textContent = '（'+(ch ? ch.name : '')+'）';
          blank.style.color = user === item.answer ? '#1A4A0A' : '#A32D2D';
          blank.style.fontWeight = '700';
        }
      });
      const pct = Math.round(sc / d.items.length * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！':'📖 解説をよく読んでもう一度挑戦しよう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${d.items.length}</strong> 問正解（${pct}点）</div>`;
    });
if (window.sendLearningRecord) {
    // d.title は単元名、pct は点数（％）として記録します
    window.sendLearningRecord(d.title, '採点結果:' + pct + '%');
  }
    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== INIT ========== */
renderSidebar();
renderContent();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  // Firebaseの設定
  const firebaseConfig = {
    apiKey: "AIzaSyBQjnlOfeVvWQJHDxGE9cq-jGsYF3uo0PY",
    authDomain: "mystudy-portal.firebaseapp.com",
    projectId: "mystudy-portal",
    storageBucket: "mystudy-portal.firebasestorage.app",
    messagingSenderId: "62253255474",
    appId: "1:62253255474:web:817a3cbd1ab3ea63e7e52b"
  };

  // Firebaseの初期化
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 教科名の設定（ファイルに合わせて固定）
  const subjectName = "国語";

  // 1. URLから studentId を取得（例: ?student=12345）
  const urlParams = new URLSearchParams(window.location.search);
  const studentId = urlParams.get('student');

  // 2. ページ読み込み時に access_logs にアクセスログを送信
  if (studentId) {
    try {
      await addDoc(collection(db, "access_logs"), {
        studentId: studentId,
        subject: subjectName,
        accessedAt: serverTimestamp()
      });
      console.log(`【My スタディ】${subjectName}のアクセスログを記録しました。`);
    } catch (error) {
      console.error("アクセスログの送信に失敗しました:", error);
    }
  } else {
    console.log("生徒IDがURLに指定されていないため、アクセスログは記録されません。");
  }

  // 3. 採点処理などから呼び出せるように window.sendResultToFirebase 関数を定義
  window.sendResultToFirebase = async function(passedSubjectName, unitName, correct, total) {
    if (!studentId) {
      console.log("生徒IDが指定されていないため、学習記録は送信されません。");
      return;
    }

    try {
      await addDoc(collection(db, "learning_records"), {
        studentId: studentId,
        subject: subjectName, // 常に「国語」として記録されます
        unit: unitName,
        correct: correct,
        total: total,
        timestamp: serverTimestamp()
      });
      console.log(`【My スタディ】${subjectName}（${unitName}）の学習記録を保存しました！`);
    } catch (error) {
      console.error("学習記録の送信に失敗しました:", error);
    }
  };
</script>
