<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国語 一問一答</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#F7F5F0;color:#2C2C2A;min-height:100vh;}
.site-header{background:linear-gradient(135deg,#C8A96E 0%,#D4B882 50%,#C09A5A 100%);padding:0;}
.site-header-inner{max-width:820px;margin:0 auto;padding:14px 24px;}
.top-label{font-size:12px;color:rgba(255,255,255,0.85);letter-spacing:.08em;margin-bottom:4px;text-align:center;}
.main-title{display:flex;align-items:center;justify-content:center;gap:12px;font-family:'Noto Serif JP',serif;font-size:28px;font-weight:700;color:#fff;letter-spacing:.06em;text-shadow:1px 1px 0 rgba(0,0,0,0.25),-1px 1px 0 rgba(0,0,0,0.25),1px -1px 0 rgba(0,0,0,0.25),-1px -1px 0 rgba(0,0,0,0.25);}
.container{max-width:820px;margin:0 auto;padding:24px 16px 60px;}
.tabs{display:flex;border-bottom:2.5px solid #B8964A;margin-bottom:20px;}
.tab-btn{padding:11px 32px;font-size:15px;font-weight:500;font-family:'Noto Sans JP',sans-serif;border:none;background:transparent;cursor:pointer;color:#888780;border-bottom:3px solid transparent;margin-bottom:-2.5px;transition:color .15s;}
.tab-btn.active{color:#8A6A1A;border-bottom-color:#B8964A;background:#F5EDDA;border-radius:6px 6px 0 0;}
.tab-btn:hover:not(.active){color:#2C2C2A;}
.main-layout{display:flex;gap:16px;align-items:flex-start;}
.sidebar{width:210px;flex-shrink:0;background:#fff;border:0.5px solid #DDD5C0;border-radius:10px;padding:8px 6px;}
.sidebar-label{font-size:11px;color:#9A8A6A;padding:6px 8px 4px;letter-spacing:.06em;font-weight:500;}
.topic-btn{display:flex;align-items:center;width:100%;text-align:left;background:transparent;border:none;border-radius:6px;padding:7px 10px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:#2C2C2A;cursor:pointer;transition:background .12s;line-height:1.4;gap:6px;}
.topic-btn:hover{background:#F5EDDA;}
.topic-btn.active{background:#F5EDDA;color:#7A5A10;font-weight:500;}
.topic-btn .t-name{flex:1;}
.badge{font-size:10px;background:#F0EBE0;color:#9A8A6A;border-radius:4px;padding:1px 5px;flex-shrink:0;white-space:nowrap;}
.topic-btn.active .badge{background:#E8D8A0;color:#7A5A10;}
.num-label{font-size:11px;color:#C0B090;margin-right:2px;flex-shrink:0;}
.topic-btn.active .num-label{color:#B8964A;}
.content-area{flex:1;min-width:0;}
.prob-header{font-size:15px;font-weight:700;color:#2C2C2A;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #DDD5C0;}
.prob-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.prob-btn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#fff;border:0.5px solid #DDD5C0;border-radius:8px;padding:13px 16px;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:#2C2C2A;cursor:pointer;transition:background .12s;}
.prob-btn:hover:not(.disabled){background:#F5EDDA;border-color:#C8A96E;}
.prob-btn.disabled{opacity:.45;cursor:default;}
.prob-btn .pill{font-size:11px;padding:2px 10px;border-radius:10px;background:#F0EBE0;color:#9A8A6A;margin-left:auto;}
.prob-btn:not(.disabled) .pill{background:#F5EDDA;color:#8A6A1A;}
.tbd-box{background:#F5F0E8;border:1px dashed #C0B090;border-radius:8px;padding:2.5rem;text-align:center;color:#9A8A6A;font-size:14px;line-height:2.2;}
.exp-box{background:#FBF7EE;border:2px solid #C8A96E;border-radius:8px;padding:1.1rem 1.4rem;margin-bottom:1.25rem;font-size:14px;line-height:2;color:#2C2C2A;}
.ex-label{font-size:12.5px;color:#9A8A6A;margin-top:8px;}
.ex-indent{padding-left:1rem;font-size:13.5px;}
.ex-small{color:#6A5A40;font-size:12.5px;padding-left:1rem;}
.mondai-title{font-size:14.5px;font-weight:700;border-left:4px solid #C8A96E;padding-left:10px;margin-bottom:10px;color:#2C2C2A;}
.hint-box{background:#FBF7EE;border:1px solid #DDD5C0;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12.5px;color:#7A5A10;}
.check-btn{width:100%;background:#C8A96E;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-bottom:10px;transition:background .12s;}
.check-btn:hover{background:#B8964A;}
.score-box{background:#FBF7EE;border:1.5px solid #C8A96E;border-radius:8px;padding:12px 16px;font-size:14px;color:#6A5A40;margin-bottom:10px;text-align:center;}
.score-box strong{color:#7A5A10;font-size:16px;}
.a-note-inline{font-size:12px;color:#9A8A6A;display:block;margin-top:4px;}
.toggle-btn{width:100%;background:transparent;border:1.5px solid #C8A96E;border-radius:8px;padding:10px;font-size:13.5px;font-weight:500;font-family:'Noto Sans JP',sans-serif;cursor:pointer;color:#8A6A1A;margin-bottom:.9rem;transition:background .12s;}
.toggle-btn:hover{background:#F5EDDA;}
.ans-wrap{display:none;}
.ans-wrap.open{display:block;}
.ans-box{background:#fff;border:1.5px solid #DDD5C0;border-radius:8px;padding:.9rem 1.3rem;}
.a-row{display:flex;gap:10px;align-items:baseline;padding:7px 0;border-bottom:.5px solid #EDE5D0;font-size:13.5px;line-height:1.75;}
.a-row:last-child{border-bottom:none;}
.a-num{min-width:24px;font-size:12px;color:#9A8A6A;}
.a-ans{font-weight:700;color:#7A5A10;min-width:28px;}
.a-text{flex:1;color:#2C2C2A;}
.a-note{font-size:12px;color:#9A8A6A;display:block;margin-top:2px;}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:none;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:#9A8A6A;cursor:pointer;margin-bottom:14px;padding:0;}
.back-btn:hover{color:#8A6A1A;}

/* 問題① COUNT */
.prob-items{background:#fff;border:1.5px solid #DDD5C0;border-radius:8px;padding:.9rem 1.3rem;margin-bottom:1rem;}
.prob-items ul{list-style:none;}
.prob-items li{display:flex;align-items:center;gap:6px;font-size:14px;line-height:2.3;}
.q-num{min-width:24px;color:#9A8A6A;font-size:13px;}
.q-text{flex:1;}
.blank{display:inline-block;min-width:52px;border-bottom:2px solid #C8A96E;text-align:center;font-size:14px;font-weight:500;color:#7A5A10;cursor:pointer;padding:0 6px;border-radius:3px 3px 0 0;transition:background .12s;}
.blank.sel{background:#F5EDDA;border-color:#8A6A1A;border-bottom-width:3px;}
.blank.filled{color:#2C2C2A;border-color:#C8A96E;}
.blank.ok{background:#EAF3DE;border-color:#3B6D11;color:#3B6D11;}
.blank.ng{background:#FCEBEB;border-color:#A32D2D;color:#A32D2D;}
.gogun-label{font-size:13px;color:#9A8A6A;margin-top:12px;margin-bottom:6px;font-weight:500;}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.chip{background:#FBF7EE;border:1.5px solid #C8A96E;border-radius:20px;padding:5px 18px;font-size:14px;font-weight:500;font-family:'Noto Sans JP',sans-serif;color:#7A5A10;cursor:pointer;transition:background .12s,transform .1s;}
.chip:hover{background:#F5EDDA;transform:scale(1.05);}
.gogun-hint{font-size:11.5px;color:#B0A080;margin-top:4px;}

/* 問題② SPLIT */
.split-card{background:#fff;border:1.5px solid #DDD5C0;border-radius:8px;padding:1rem 1.2rem;margin-bottom:8px;}
.split-card .sn{font-size:12px;color:#9A8A6A;margin-bottom:6px;}
.split-line{display:flex;flex-wrap:wrap;align-items:center;font-size:13.5px;line-height:2;}
.s-ch{display:inline;}
.s-gap{display:inline;font-size:14.5px;color:transparent;cursor:pointer;padding:0 1px;user-select:none;transition:color .1s;}
.s-gap:hover{color:rgba(200,169,110,0.5);}
.s-gap.on{color:#7A5A10;}
.s-gap.ok{color:#3B6D11;}
.s-gap.ng{color:#A32D2D;}
.s-gap.miss{color:#3B6D11;opacity:0.45;}

/* 問題③ SHUGO */
.shugo-card{background:#fff;border:1.5px solid #DDD5C0;border-radius:8px;padding:1rem 1.2rem;margin-bottom:8px;}
.shugo-card .sn{font-size:12px;color:#9A8A6A;margin-bottom:8px;}
.parts-row{display:flex;flex-wrap:wrap;gap:8px;}
.pchip{padding:6px 14px;border-radius:6px;font-size:14px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;border:1.5px solid #DDD5C0;background:#F7F5F0;color:#2C2C2A;transition:all .12s;user-select:none;}
.pchip:hover{border-color:#C8A96E;background:#FBF7EE;}
.pchip.as-s{background:#EAF3DE;border-color:#3B6D11;color:#1A4A0A;font-weight:500;}
.pchip.as-j{background:#E6F1FB;border-color:#185FA5;color:#042C53;font-weight:500;}
.pchip.ok{box-shadow:0 0 0 2.5px #3B6D11;}
.pchip.ng{background:#FCEBEB;border-color:#A32D2D;color:#A32D2D;}
.mode-bar{display:flex;gap:8px;margin-bottom:10px;}
.mchip{padding:7px 18px;border-radius:20px;font-size:13px;font-weight:500;font-family:'Noto Sans JP',sans-serif;cursor:pointer;border:1.5px solid #DDD5C0;background:transparent;color:#9A8A6A;transition:background .12s;}
.mchip.ms{background:#EAF3DE;border-color:#3B6D11;color:#1A4A0A;}
.mchip.mj{background:#E6F1FB;border-color:#185FA5;color:#042C53;}
.legend-row{display:flex;gap:14px;font-size:12px;color:#9A8A6A;margin-bottom:10px;}
.leg{display:flex;align-items:center;gap:5px;}
.ldot{width:12px;height:12px;border-radius:3px;}

/* 問題④ MODIFY */
.modify-card{background:#fff;border:1.5px solid #DDD5C0;border-radius:8px;padding:1rem 1.2rem;margin-bottom:8px;}
.modify-card .sn{font-size:12px;color:#9A8A6A;margin-bottom:8px;}
.modify-row{display:flex;flex-wrap:wrap;gap:8px;}
.mfchip{padding:6px 14px;border-radius:6px;font-size:14px;font-family:'Noto Sans JP',sans-serif;border:1.5px solid #DDD5C0;background:#F7F5F0;color:#2C2C2A;transition:all .12s;user-select:none;}
.mfchip.clickable{cursor:pointer;}
.mfchip.clickable:hover{border-color:#C8A96E;background:#FBF7EE;}
.mfchip.target{background:#FAECE7;border-color:#C8443A;color:#C8443A;font-weight:700;cursor:default;}
.mfchip.sel{background:#F5EDDA;border-color:#B8964A;color:#7A5A10;font-weight:500;}
.mfchip.ok{background:#EAF3DE;border-color:#3B6D11;color:#1A4A0A;box-shadow:0 0 0 2px #3B6D11;}
.mfchip.ng{background:#FCEBEB;border-color:#A32D2D;color:#A32D2D;}
.mfchip.miss{background:#EAF3DE;border-color:#3B6D11;color:#1A4A0A;opacity:0.5;}

/* 問題⑤ MODREV */
.mrchip{padding:6px 14px;border-radius:6px;font-size:14px;font-family:'Noto Sans JP',sans-serif;border:1.5px solid #DDD5C0;background:#F7F5F0;color:#2C2C2A;transition:all .12s;user-select:none;}
.mrchip.clickable{cursor:pointer;}
.mrchip.clickable:hover{border-color:#C8A96E;background:#FBF7EE;}
.mrchip.sel{background:#F5EDDA;border-color:#B8964A;color:#7A5A10;font-weight:500;}
.mrchip.ok{background:#EAF3DE;border-color:#3B6D11;color:#1A4A0A;box-shadow:0 0 0 2px #3B6D11;}
.mrchip.ng{background:#FCEBEB;border-color:#A32D2D;color:#A32D2D;}
.mrchip.miss{background:#EAF3DE;border-color:#3B6D11;color:#1A4A0A;opacity:0.5;}

/* 文の構造 RELTYPE */
.rel-choice-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.rel-choice{padding:6px 14px;border-radius:6px;font-size:13px;font-family:'Noto Sans JP',sans-serif;border:1.5px solid #DDD5C0;background:#F7F5F0;color:#2C2C2A;cursor:pointer;transition:all .12s;text-align:left;}
.rel-choice:hover{border-color:#C8A96E;background:#FBF7EE;}
.rel-choice.sel{background:#F5EDDA;border-color:#B8964A;color:#7A5A10;font-weight:500;}
.rel-choice.ok{background:#EAF3DE !important;border-color:#3B6D11 !important;color:#1A4A0A !important;font-weight:700;}
.rel-choice.ng{background:#FCEBEB !important;border-color:#A32D2D !important;color:#A32D2D !important;}

/* 指示語 CHOOSE */
.choose-card{background:#fff;border:1.5px solid #DDD5C0;border-radius:8px;padding:1rem 1.2rem;margin-bottom:8px;}
.choose-card .sn{font-size:12px;color:#9A8A6A;margin-bottom:8px;font-weight:500;}
.choose-option{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:6px;margin-bottom:6px;font-size:13.5px;line-height:1.9;border:1.5px solid #EDE5D0;background:#FAFAF8;cursor:pointer;transition:all .12s;user-select:none;}
.choose-option:last-child{margin-bottom:0;}
.choose-option:hover{border-color:#C8A96E;background:#FBF7EE;}
.choose-option.sel{border-color:#B8964A;background:#F5EDDA;}
.choose-option.ok{border-color:#3B6D11 !important;background:#EAF3DE !important;}
.choose-option.ng{border-color:#A32D2D !important;background:#FCEBEB !important;}
.choose-option.miss{border-color:#3B6D11;background:#EAF3DE;opacity:0.5;}
.choose-label{font-weight:700;color:#8A6A1A;min-width:18px;flex-shrink:0;margin-top:1px;}
.choose-option.ok .choose-label{color:#1A4A0A;}
.choose-option.ng .choose-label{color:#A32D2D;}

/* 品詞 FILLSELECT */
.fillselect-passage{background:#fff;border:1.5px solid #C8A96E;border-radius:8px;padding:1rem 1.3rem;margin-bottom:14px;font-size:13.5px;line-height:2.2;color:#2C2C2A;}
.fillselect-passage .compare-box{background:#F0F8F0;border:1.5px solid #5A9A5A;border-radius:6px;padding:10px 16px;margin:10px 0;font-size:14px;line-height:2.4;}
.fillselect-passage .arrow{text-align:center;font-size:16px;color:#5A9A5A;margin:2px 0;}
.fillselect-sentence{display:flex;flex-wrap:wrap;align-items:center;gap:4px;font-size:14px;line-height:2.4;margin-bottom:6px;}
.fs-blank{display:inline-flex;align-items:center;justify-content:center;min-width:80px;padding:2px 10px;border-bottom:2.5px solid #C8A96E;border-radius:3px 3px 0 0;font-size:14px;font-weight:500;color:#8A6A1A;cursor:pointer;background:transparent;transition:background .12s;white-space:nowrap;}
.fs-blank.sel{background:#F5EDDA;border-color:#8A6A1A;border-bottom-width:3px;}
.fs-blank.filled{color:#2C2C2A;}
.fs-blank.ok{background:#EAF3DE;border-color:#3B6D11;color:#3B6D11;}
.fs-blank.ng{background:#FCEBEB;border-color:#A32D2D;color:#A32D2D;}

/* 自立語・付属語 WORDSEL */
.wordsel-card{background:#fff;border:1.5px solid #DDD5C0;border-radius:8px;padding:1rem 1.2rem;margin-bottom:8px;}
.wordsel-card .sn{font-size:12px;color:#9A8A6A;margin-bottom:6px;font-weight:500;}
.wordsel-display{font-size:14px;line-height:2;color:#5A4A2A;margin-bottom:10px;padding:6px 10px;background:#FBF7EE;border-radius:5px;}
.wchip-row{display:flex;flex-wrap:wrap;gap:8px;}
.wchip{padding:7px 18px;border-radius:6px;font-size:14px;font-weight:500;font-family:'Noto Sans JP',sans-serif;border:2px solid #5A9A30;background:#6DB33F;color:#fff;cursor:pointer;transition:all .12s;user-select:none;}
.wchip:hover{background:#5A9A30;transform:scale(1.04);}
.wchip.sel{background:#3B6D11;border-color:#2A5A08;box-shadow:0 0 0 3px rgba(59,109,17,0.25);}
.wchip.ok{background:#2A5A08 !important;border-color:#1A4A00 !important;box-shadow:0 0 0 3px #3B6D11;}
.wchip.ng{background:#A32D2D !important;border-color:#7A1A1A !important;}
.wchip.miss{background:#5A9A30;border-color:#3B6D11;opacity:0.45;}

/* 自立語・付属語 LITSEL（文学文インライン選択） */
.litsel-card{background:#fff;border:1.5px solid #DDD5C0;border-radius:8px;padding:1rem 1.2rem;margin-bottom:10px;}
.litsel-card .sn{font-size:12px;color:#9A8A6A;margin-bottom:8px;font-weight:500;}
.litsel-sentence{font-size:14px;line-height:2.6;color:#2C2C2A;display:flex;flex-wrap:wrap;align-items:center;gap:3px;margin-bottom:8px;}
.litsel-text{display:inline;}
.litsel-chip{display:inline-flex;align-items:center;justify-content:center;padding:5px 16px;border-radius:6px;font-size:14px;font-weight:500;font-family:'Noto Sans JP',sans-serif;border:2px solid #5A9A30;background:#6DB33F;color:#fff;cursor:pointer;transition:all .12s;user-select:none;white-space:nowrap;}
.litsel-chip:hover{background:#5A9A30;transform:scale(1.04);}
.litsel-chip.sel{background:#3B6D11;border-color:#2A5A08;box-shadow:0 0 0 3px rgba(59,109,17,0.25);}
.litsel-chip.ok{background:#2A5A08 !important;border-color:#1A4A00 !important;box-shadow:0 0 0 3px #3B6D11;}
.litsel-chip.ng{background:#A32D2D !important;border-color:#7A1A1A !important;}
.litsel-chip.miss{background:#5A9A30;border-color:#3B6D11;opacity:0.4;}
.litsel-source{font-size:12px;color:#9A8A6A;margin-top:4px;}

/* 助動詞② SENTSEL */
.sentsel-btn{display:flex;align-items:flex-start;gap:10px;width:100%;text-align:left;background:#6DB33F;border:2px solid #5A9A30;border-radius:8px;padding:11px 16px;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:#fff;cursor:pointer;transition:all .12s;margin-bottom:8px;user-select:none;}
.sentsel-btn:hover{background:#5A9A30;transform:translateX(2px);}
.sentsel-btn.sel{background:#3B6D11;border-color:#2A5A08;box-shadow:0 0 0 3px rgba(59,109,17,0.3);}
.sentsel-btn.ok{background:#2A5A08 !important;border-color:#1A4A00 !important;box-shadow:0 0 0 3px #3B6D11;}
.sentsel-btn.ng{background:#A32D2D !important;border-color:#7A1A1A !important;}
.sentsel-btn.miss{background:#5A9A30;border-color:#3B6D11;opacity:0.45;}
.sentsel-qnum{font-weight:700;min-width:22px;flex-shrink:0;font-size:13px;margin-top:1px;}

/* 副詞② FILLIN */
.fillin-card{background:#fff;border:1.5px solid #DDD5C0;border-radius:8px;padding:1rem 1.2rem;margin-bottom:8px;}
.fillin-card .sn{font-size:12px;color:#9A8A6A;margin-bottom:8px;font-weight:500;}
.fillin-sentence{font-size:14px;line-height:2.4;display:flex;flex-wrap:wrap;align-items:center;gap:2px;}
.fi-box{display:inline-flex;align-items:center;border:2px solid #C8A96E;border-radius:4px;background:#FBF7EE;padding:1px 4px;gap:2px;}
.fi-char{display:inline-block;width:26px;height:32px;border-bottom:2.5px solid #C8A96E;text-align:center;line-height:32px;font-size:14px;font-weight:500;color:#2C2C2A;background:transparent;border-radius:0;outline:none;font-family:'Noto Sans JP',sans-serif;transition:background .12s;}
.fi-char:focus{background:#F5EDDA;border-bottom-color:#8A6A1A;}
.fi-char.ok{background:#EAF3DE !important;border-bottom-color:#3B6D11 !important;color:#1A4A0A !important;}
.fi-char.ng{background:#FCEBEB !important;border-bottom-color:#A32D2D !important;color:#A32D2D !important;}

/* 動詞活用表 KATSUYOU */
.kats-table{width:100%;border-collapse:collapse;margin-bottom:12px;}
.kats-table th{background:#F5EDDA;color:#7A5A10;font-size:12.5px;padding:7px 10px;border:1px solid #DDD5C0;white-space:nowrap;}
.kats-table td{background:#fff;font-size:14px;padding:7px 10px;border:1px solid #DDD5C0;vertical-align:middle;}
.kats-table td.fixed{color:#2C2C2A;font-weight:500;}
.kats-input{width:60px;border:none;border-bottom:2.5px solid #C8A96E;background:transparent;font-size:14px;font-family:'Noto Sans JP',sans-serif;text-align:center;outline:none;color:#2C2C2A;padding:2px 4px;transition:border-color .12s;}
.kats-input:focus{border-bottom-color:#8A6A1A;background:#FBF7EE;}
.kats-input.ok{background:#EAF3DE;border-bottom-color:#3B6D11;color:#1A4A0A;}
.kats-input.ng{background:#FCEBEB;border-bottom-color:#A32D2D;color:#A32D2D;}

/* 古典 KOTENKANA */
.kana-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:12px;}

.senryu-inp.ok{background:#EAF3DE;border-bottom-color:#3B6D11;color:#1A4A0A;}
.senryu-inp.ng{background:#FCEBEB;border-bottom-color:#A32D2D;color:#A32D2D;}

.jkchip{padding:8px 16px;border-radius:6px;font-size:13px;font-family:'Noto Sans JP',sans-serif;border:1.5px solid #DDD5C0;background:#F7F5F0;color:#2C2C2A;cursor:pointer;transition:all .12s;}

.jkchip.ng{background:#FCEBEB !important;border-color:#A32D2D !important;color:#A32D2D !important;}

.tmchip.ng{background:#A32D2D !important;border-color:#7A1A1A !important;}

// SHUGO state
let shugoSel = {}, shugoMode = 'shugo';
// MODIFY state
let modSel = {};
// MODREV state
let modRevSel = {};

/* ========== NAV ========== */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const t = parseInt(btn.dataset.tab);
    curTab = t; curTopic = 0; curProb = null;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sidebar-label').textContent = TABS[t] + ' 内容';
    renderSidebar(); renderContent();
  });
});

function goTopic(i) { curTopic = i; curProb = null; renderSidebar(); renderContent(); }
function goProb(i) { curProb = i; renderContent(); }
function goBack() { curProb = null; renderContent(); }

function renderSidebar() {
  const topics = TOPICS[curTab];
  document.getElementById('sidebar-list').innerHTML = topics.map((t, i) => {
    const cnt = t.probs.length;
    const badge = cnt > 0 ? `<span class="badge">${cnt}問</span>` : `<span class="badge">未定</span>`;
    const active = i === curTopic ? ' active' : '';
    return `<button class="topic-btn${active}" onclick="goTopic(${i})">
      <span class="num-label">${i + 1}.</span><span class="t-name">${t.name}</span>${badge}
    </button>`;
  }).join('');
}

function renderContent() {
  const topic = TOPICS[curTab][curTopic];
  const c = document.getElementById('content');

  if (curProb !== null) {
    const key = curTab + '-' + curTopic + '-' + curProb;
    const pd = PROB_MAP[key];
    let inner = '';
    if (pd) {
      if (pd.type === 'count')  inner = buildCount(pd);
      else if (pd.type === 'split')  inner = buildSplit(pd);
      else if (pd.type === 'shugo') inner = buildShugo(pd);
      else if (pd.type === 'modify') inner = buildModify(pd);
      else if (pd.type === 'modrev') inner = buildModRev(pd);
      else if (pd.type === 'reltype')  inner = buildRelType(pd);
      else if (pd.type === 'choose')      inner = buildChoose(pd);
      else if (pd.type === 'fillselect')  inner = buildFillSelect(pd);
      else if (pd.type === 'wordsel')     inner = buildWordSel(pd);
      else if (pd.type === 'litsel')      inner = buildLitSel(pd);
      else if (pd.type === 'blanks7')     inner = buildBlanks7(pd);
      else if (pd.type === 'multiblanks') inner = buildMultiBlanks(pd);
      else if (pd.type === 'hinshu3')     inner = buildHinshu3(pd);
      else if (pd.type === 'sentpos')     inner = buildSentPos(pd);
      else if (pd.type === 'sentsel')     inner = buildSentSel(pd);
      else if (pd.type === 'fillin')      inner = buildFillIn(pd);
      else if (pd.type === 'katsuyou')    inner = buildKatsuyou(pd);
      else if (pd.type === 'kotenkana')   inner = buildKotenKana(pd);
      else if (pd.type === 'jikoku')      inner = buildJikoku(pd);
      else if (pd.type === 'bunpou')      inner = buildBunpou(pd);
      else if (pd.type === 'hyakunin_ab')     inner = buildHyakuninAB(pd);
      else if (pd.type === 'hyakunin_season') inner = buildHyakuninSeason(pd);
      else if (pd.type === 'iroha')           inner = buildIroha(pd);
      else if (pd.type === 'kigoseason')      inner = buildKigoSeason(pd);
      else if (pd.type === 'kojimatch')       inner = buildKojiMatch(pd);
      else if (pd.type === 'kojifill')        inner = buildKojiFill(pd);
      else if (pd.type === 'waka_reading')    inner = buildWakaReading(pd);
      else if (pd.type === 'wakamatch')       inner = buildWakaMatch(pd);
      else if (pd.type === 'tsukimei')    inner = buildTsukiMei(pd);
      else if (pd.type === 'langunit') inner = buildLangUnit(pd);
    } else {
      inner = `<div class="tbd-box">📝 この問題は現在準備中です。<br>もうしばらくお待ちください！</div>`;
    }
    c.innerHTML = `<button class="back-btn" onclick="goBack()">← ${topic.name}の問題一覧へ戻る</button>${inner}`;
    return;
  }

  let html = `<div class="prob-header">${curTopic + 1}. ${topic.name}</div>`;
  if (topic.probs.length === 0) {
    html += `<div class="tbd-box">📋 この単元の問題は現在準備中です。<br>順次追加予定です。お楽しみに！</div>`;
  } else {
    html += '<div class="prob-list">';
    topic.probs.forEach((p, i) => {
      if (p.open) {
        html += `<button class="prob-btn" onclick="goProb(${i})"><span>${p.title}</span><span class="pill">開く →</span></button>`;
      } else {
        html += `<button class="prob-btn disabled" disabled><span>${p.title}</span><span class="pill">準備中</span></button>`;
      }
    });
    html += '</div>';
  }
  c.innerHTML = html;
}

/* ========== COUNT ========== */
function buildCount(d) {
  cVals = {}; cSelBlank = null;
  let rows = '';
  d.items.forEach((p, i) => {
    rows += `<li><span class="q-num">${p.q}</span><span class="q-text">${p.text}</span>
      <span class="blank" data-idx="${i}">　　　</span></li>`;
  });
  let chips = '';
  d.gogun.forEach(v => { chips += `<button class="chip" data-val="${v}">${v}</button>`; });
  const ansRows = d.answers.map(a =>
    `<div class="a-row"><span class="a-num">${a.n}</span><span class="a-ans">${a.c}</span>
     <span class="a-text">${a.t}${a.note ? `<span class="a-note">・${a.note}</span>` : ''}</span></div>`
  ).join('');
  const html = `
    <div class="exp-box">${d.exp}
      <div class="ex-label">（例）</div>
      <div class="ex-indent">${d.example}</div>
      <div class="ex-small">${d.exNote}</div>
    </div>
    <div class="mondai-title">【問　題】${d.mondai}</div>
    <div class="prob-items">
      <ul>${rows}</ul>
      <div class="gogun-label">（語群）</div>
      <div class="chip-row">${chips}</div>
      <div class="gogun-hint">① 記入欄をクリック → ② 語群から選んでクリック</div>
    </div>
    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap"><div class="ans-box">${ansRows}</div></div>`;

  // attach after insertion
  setTimeout(() => {
    document.querySelectorAll('.blank[data-idx]').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.blank').forEach(b => b.classList.remove('sel'));
        cSelBlank = parseInt(el.dataset.idx);
        el.classList.add('sel');
      });
    });
    document.querySelectorAll('.chip[data-val]').forEach(el => {
      el.addEventListener('click', () => {
        if (cSelBlank === null) return;
        cVals[cSelBlank] = el.dataset.val;
        const b = document.querySelector('.blank[data-idx="' + cSelBlank + '"]');
        if (b) { b.textContent = el.dataset.val; b.classList.remove('sel','ok','ng'); b.classList.add('filled'); }
        cSelBlank = null;
      });
    });
    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0;
      d.answers.forEach((a, i) => {
        const b = document.querySelector('.blank[data-idx="' + i + '"]');
        if (!b) return;
        const u = cVals[i] || '';
        b.classList.remove('sel','filled','ok','ng');
        if (!u) { b.classList.add('filled'); return; }
        if (u === a.c) { b.classList.add('ok'); sc++; } else { b.classList.add('ng'); }
      });
      const pct = Math.round(sc / d.answers.length * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！':'📖 もう一度考えてみよう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${d.answers.length}</strong> 問正解（${pct}点）</div>`;
    });
    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== SPLIT ========== */
function buildSplit(d) {
  splitSel = {};
  d.items.forEach((_, i) => { splitSel[i] = new Set(); });
  let cards = '';
  d.items.forEach((item, idx) => {
    const chars = [...item.text];
    let line = '';
    chars.forEach((ch, ci) => {
      line += `<span class="s-ch">${ch}</span>`;
      if (ci < chars.length - 1) {
        line += `<span class="s-gap" data-idx="${idx}" data-pos="${ci}">／</span>`;
      }
    });
    cards += `<div class="split-card"><div class="sn">問 ${item.q}</div><div class="split-line">${line}</div></div>`;
  });
  const ansRows = d.items.map(item =>
    `<div class="a-row"><span class="a-num">${item.q}</span><span class="a-text">${item.ans}</span></div>`
  ).join('');
  const html = `
    ${d.exp ? '<div class="exp-box">' + d.exp + '</div>' : ''}
    <div class="mondai-title">【問　題】${d.mondai}</div>
    <div class="hint-box">💡 ${d.hint}</div>
    ${cards}
    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap"><div class="ans-box">${ansRows}</div></div>`;
  setTimeout(() => {
    document.querySelectorAll('.s-gap').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx), pos = parseInt(el.dataset.pos);
        if (splitSel[idx].has(pos)) { splitSel[idx].delete(pos); el.classList.remove('on'); }
        else { splitSel[idx].add(pos); el.classList.add('on'); }
      });
    });
    document.getElementById('chk-btn').addEventListener('click', () => {
      let ok = 0, total = 0;
      d.items.forEach((item, idx) => {
        const correct = new Set(item.cuts);
        const user = splitSel[idx];
        total += correct.size;
        const all = new Set([...correct, ...user]);
        all.forEach(pos => {
          const el = document.querySelector('.s-gap[data-idx="' + idx + '"][data-pos="' + pos + '"]');
          if (!el) return;
          el.classList.remove('on','ok','ng','miss');
          if (correct.has(pos) && user.has(pos)) { el.classList.add('ok'); ok++; }
          else if (correct.has(pos)) { el.classList.add('miss'); }
          else { el.classList.add('ng'); }
        });
      });
      const pct = Math.round(ok / total * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！':'📖 もう一度見直そう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${ok} / ${total}</strong> か所正解（${pct}点）
        <span class="a-note-inline">🟢 正解の「／」　🔴 誤りの「／」　薄い緑＝入れ忘れ</span></div>`;
    });
    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== SHUGO ========== */
function buildShugo(d) {
  shugoSel = {}; shugoMode = 'shugo';
  d.items.forEach((_, i) => { shugoSel[i] = { s: null, j: null }; });
  let cards = '';
  d.items.forEach((item, idx) => {
    let chips = '';
    item.parts.forEach((p, pi) => {
      chips += `<span class="pchip" data-idx="${idx}" data-pi="${pi}">${p}</span>`;
    });
    cards += `<div class="shugo-card"><div class="sn">問 ${item.q}</div><div class="parts-row">${chips}</div></div>`;
  });
  const ansRows = d.items.map(item =>
    `<div class="a-row"><span class="a-num">${item.q}</span>
    <span class="a-text">主語：<strong>${item.parts[item.shugo]}</strong>　述語：<strong>${item.parts[item.jutsugo]}</strong>
    ${item.note ? `<span class="a-note">・${item.note}</span>` : ''}</span></div>`
  ).join('');
  const html = `
    <div class="exp-box">${d.exp}</div>
    <div class="mondai-title">【問　題】${d.mondai}</div>
    <div class="hint-box">💡 ${d.hint}</div>
    <div class="mode-bar">
      <button class="mchip ms" id="mode-s">🟢 主語を選ぶ</button>
      <button class="mchip" id="mode-j">🔵 述語を選ぶ</button>
    </div>
    <div class="legend-row">
      <div class="leg"><div class="ldot" style="background:#EAF3DE;border:1.5px solid #3B6D11;"></div><span>主語</span></div>
      <div class="leg"><div class="ldot" style="background:#E6F1FB;border:1.5px solid #185FA5;"></div><span>述語</span></div>
    </div>
    ${cards}
    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap"><div class="ans-box">${ansRows}</div></div>`;
  setTimeout(() => {
    document.getElementById('mode-s').addEventListener('click', function() {
      shugoMode = 'shugo';
      this.className = 'mchip ms';
      document.getElementById('mode-j').className = 'mchip';
    });
    document.getElementById('mode-j').addEventListener('click', function() {
      shugoMode = 'jutsugo';
      this.className = 'mchip mj';
      document.getElementById('mode-s').className = 'mchip';
    });
    document.querySelectorAll('.pchip').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx), pi = parseInt(el.dataset.pi);
        const sel = shugoSel[idx];
        if (shugoMode === 'shugo') {
          if (sel.s !== null) { const p = document.querySelector('.pchip[data-idx="'+idx+'"][data-pi="'+sel.s+'"]'); if(p) p.classList.remove('as-s'); }
          if (sel.j === pi) { sel.j = null; el.classList.remove('as-j'); }
          sel.s = pi; el.classList.remove('as-j'); el.classList.add('as-s');
        } else {
          if (sel.j !== null) { const p = document.querySelector('.pchip[data-idx="'+idx+'"][data-pi="'+sel.j+'"]'); if(p) p.classList.remove('as-j'); }
          if (sel.s === pi) { sel.s = null; el.classList.remove('as-s'); }
          sel.j = pi; el.classList.remove('as-s'); el.classList.add('as-j');
        }
      });
    });
    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0;
      d.items.forEach((item, idx) => {
        const sel = shugoSel[idx];
        if (sel.s === item.shugo && sel.j === item.jutsugo) sc++;
        item.parts.forEach((_, pi) => {
          const el = document.querySelector('.pchip[data-idx="'+idx+'"][data-pi="'+pi+'"]');
          if (!el) return;
          el.classList.remove('ok','ng');
          if ((pi === item.shugo && sel.s === pi) || (pi === item.jutsugo && sel.j === pi)) el.classList.add('ok');
          else if ((sel.s === pi && pi !== item.shugo) || (sel.j === pi && pi !== item.jutsugo)) el.classList.add('ng');
        });
      });
      const pct = Math.round(sc / d.items.length * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！':'📖 主語・述語をもう一度確認しよう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${d.items.length}</strong> 問正解（${pct}点）</div>`;
    });
    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== MODIFY ========== */
function buildModify(d) {
  modSel = {};
  d.items.forEach((_, i) => { modSel[i] = new Set(); });
  let cards = '';
  d.items.forEach((item, idx) => {
    let chips = '';
    item.parts.forEach((p, pi) => {
      if (pi === item.target) {
        chips += `<span class="mfchip target">${p}</span>`;
      } else {
        chips += `<span class="mfchip clickable" data-idx="${idx}" data-pi="${pi}">${p}</span>`;
      }
    });
    cards += `<div class="modify-card"><div class="sn">問 ${item.q}</div><div class="modify-row">${chips}</div></div>`;
  });
  const ansRows = d.items.map(item =>
    `<div class="a-row"><span class="a-num">${item.q}</span>
    <span class="a-text"><strong>${item.answers.map(ai => item.parts[ai]).join('　')}</strong>
    <span class="a-note">・${item.note}</span></span></div>`
  ).join('');
  const html = `
    <div class="exp-box">${d.exp}</div>
    <div class="mondai-title">【問　題】${d.mondai}</div>
    <div class="hint-box">💡 ${d.hint}</div>
    ${cards}
    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap"><div class="ans-box">${ansRows}</div></div>`;
  setTimeout(() => {
    document.querySelectorAll('.mfchip.clickable').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx), pi = parseInt(el.dataset.pi);
        if (modSel[idx].has(pi)) { modSel[idx].delete(pi); el.classList.remove('sel'); }
        else { modSel[idx].add(pi); el.classList.add('sel'); }
      });
    });
    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0;
      d.items.forEach((item, idx) => {
        const correct = new Set(item.answers);
        const user = modSel[idx];
        const allOk = item.answers.every(p => user.has(p)) && [...user].every(p => correct.has(p));
        if (allOk) sc++;
        const all = new Set([...correct, ...user]);
        all.forEach(pi => {
          const el = document.querySelector('.mfchip[data-idx="'+idx+'"][data-pi="'+pi+'"]');
          if (!el) return;
          el.classList.remove('sel','ok','ng','miss');
          if (correct.has(pi) && user.has(pi)) el.classList.add('ok');
          else if (correct.has(pi)) el.classList.add('miss');
          else el.classList.add('ng');
        });
      });
      const pct = Math.round(sc / d.items.length * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！':'📖 修飾語をもう一度探してみよう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${d.items.length}</strong> 問正解（${pct}点）
        <span class="a-note-inline">🟢 正解　🔴 誤り　薄い緑＝選び忘れ</span></div>`;
    });
    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== TSUKIMEI（月の別名テーブル） ========== */
function buildTsukiMei(d) {
  let tmSel = {};
  d.allMonths.forEach(m => { if (m.q) tmSel[m.qKey] = null; });
  const qMonths = d.allMonths.filter(m => m.q);

  // 語群
  const gogunHtml = d.gogun.map(g =>
    `<span style="display:inline-flex;flex-direction:column;align-items:center;gap:2px;background:#FBF7EE;border:1.5px solid #C8A96E;border-radius:8px;padding:6px 14px;font-size:13px;">
      <span style="font-size:11px;color:#9A8A6A;">${g.ruby}</span>
      <strong style="color:#8A6A1A;">${g.label}　${g.name}</strong>
    </span>`
  ).join('');

  // テーブル（左：春夏 1-6月、右：秋冬 7-12月）
  const left  = d.allMonths.slice(0, 6);
  const right = d.allMonths.slice(6, 12);
  let tableRows = '';
  for (let i = 0; i < 6; i++) {
    const l = left[i], r = right[i];
    const makeCell = m => {
      if (m.q) {
        const chips = d.gogun.map(g =>
          `<button class="tmchip" data-qkey="${m.qKey}" data-val="${g.label}">${g.label}</button>`
        ).join('');
        return `<td style="padding:8px 10px;border-bottom:1px solid #EDE5D0;border-right:1px solid #EDE5D0;">
          <span style="font-size:13px;font-weight:500;color:#5A4A2A;">${m.month}</span>
          <div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;">${chips}</div>
        </td>`;
      }
      return `<td style="padding:8px 10px;border-bottom:1px solid #EDE5D0;border-right:1px solid #EDE5D0;">
        <span style="font-size:13px;font-weight:500;color:#5A4A2A;">${m.month}</span>
        <div><span style="font-size:11px;color:#9A8A6A;display:block;">${m.ruby}</span>
        <span style="font-size:15px;font-family:'Noto Serif JP',serif;font-weight:700;">${m.name}</span></div>
      </td>`;
    };
    const seasonL = l.season ? `<td rowspan="3" style="background:#F5EDDA;font-weight:700;color:#8A6A1A;text-align:center;padding:8px;border-right:1px solid #DDD5C0;border-bottom:1px solid #EDE5D0;width:36px;font-size:14px;">${l.season}</td>` : '';
    const seasonR = r.season ? `<td rowspan="3" style="background:#F5EDDA;font-weight:700;color:#8A6A1A;text-align:center;padding:8px;border-right:1px solid #DDD5C0;border-bottom:1px solid #EDE5D0;width:36px;font-size:14px;">${r.season}</td>` : '';
    tableRows += `<tr>${seasonL}${makeCell(l)}${seasonR}${makeCell(r)}</tr>`;
  }

  const ansRows = qMonths.map(m =>

/* ========== KIGOSEASON（季語入力＋季節選択） ========== */

  d.items.forEach((_, i) => { ksSel[i] = null; });

  let cards = '';
  d.items.forEach((item, idx) => {
    const chips = item.seasonGogun.map(v =>

    ).join('');

      <div class="kigo-row">
        <span class="kigo-label">季語：</span>
        <input class="kigo-inp" type="text" data-idx="${idx}" placeholder="　　　　" autocomplete="off">
      </div>
      <div class="kigo-row">
        <span class="kigo-label">季節：</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">${chips}</div>
      </div>
    </div>`;
  });

  const ansRows = d.items.map(item =>
    `<div class="a-row" style="flex-direction:column;align-items:flex-start;gap:2px;">
      <div><span class="a-num">${item.q}</span>
        　季語：<strong style="color:#7A5A10;">${item.kigo}</strong>
        　季節：<strong style="color:#7A5A10;">${item.season}</strong>
      </div>
    </div>`
  ).join('');

  const html = `
    <div class="exp-box">${d.exp}</div>
    <div class="mondai-title">【問　題】${d.mondai}</div>
    <div class="hint-box">💡 ${d.hint}</div>
    ${cards}
    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap"><div class="ans-box">${ansRows}</div></div>`;

  setTimeout(() => {
    document.querySelectorAll('.schip').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx), val = el.dataset.val;
        document.querySelectorAll(`.schip[data-idx="${idx}"]`).forEach(c => c.classList.remove('sel'));
        if (ksSel[idx] === val) { ksSel[idx] = null; }
        else { ksSel[idx] = val; el.classList.add('sel'); }
      });
    });

    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0, total = 0;
      d.items.forEach((item, idx) => {
        // 季語採点（部分一致OK）
        const kigoEl = document.querySelector(`.kigo-inp[data-idx="${idx}"]`);
        if (kigoEl) {
          total++;
          kigoEl.classList.remove('ok','ng');
          const userKigo = kigoEl.value.trim();
          const kigoOk = userKigo && item.kigo.includes(userKigo) || userKigo === item.kigo.replace(/（.*?）/,'').trim();
          if (userKigo) {
            if (kigoOk) { kigoEl.classList.add('ok'); sc++; }
            else kigoEl.classList.add('ng');
          }
        }
        // 季節採点
        total++;
        const userSeason = ksSel[idx];
        document.querySelectorAll(`.schip[data-idx="${idx}"]`).forEach(c => {
          c.classList.remove('sel','ok','ng');
          if (c.dataset.val === item.season) c.classList.add('ok');
          else if (c.dataset.val === userSeason) c.classList.add('ng');
        });
        if (userSeason === item.season) sc++;
      });
      const pct = Math.round(sc / total * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！季語を探してみよう！':'📖 各俳句の中の季節を表す言葉（季語）を探してみよう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${total}</strong> 問正解（${pct}点）</div>`;
    });

    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

}

/* ========== BUNPOU（古典文章読解） ========== */
function buildBunpou(d) {
  let bpSel = {};
  d.parts.forEach((p, i) => { if (p.type === 'choice') bpSel[i] = null; });
  let kanaVals = {};
  d.parts.forEach((p, i) => { if (p.type === 'kana3') p.items.forEach((_, j) => { kanaVals[`${i}-${j}`] = ''; }); });

  // 本文表示（シンプルな構造に整理）
  const passageSegments = [
    {type:'ruby', before:'今は昔，竹取の', word:'翁', ruby:'おきな', after:'といふ者ありけり。野山にまじりて竹を取りつつ，'},
    {type:'note', text:'いた。', pos:'right'},
    {type:'br'},
    {type:'text', text:'よろづのことに使ひけり。名をばさぬきの'},
    {type:'ruby', before:'', word:'造', ruby:'みやつこ', after:'となむいひける。その竹の'},
    {type:'note', text:'いろいろな物を作るのに', pos:'left'},
    {type:'br'},
    {type:'text', text:'中に，もと光る竹なむ一筋ありける。'},
    {type:'note', text:'根元が', pos:'left'},
    {type:'text', text:'あやしがりて寄りて見るに，筒の中光り'},
    {type:'note', text:'不思議に思って', pos:'left'},
    {type:'br'},
    {type:'text', text:'たり。それを見れば，三寸ばかりなる人，いとうつくしうてゐたり。'},
    {type:'note', text:'とても　　　　座っている', pos:'left'},
  ];
  const segs = d.passage ? d.passage : passageSegments;

  let passageHtml = '<div style="font-family:\'Noto Serif JP\',serif;font-size:14.5px;line-height:2.0;color:#2C2C2A;">';
  segs.forEach(seg => {
    const type = seg.type || (seg.br ? 'br' : seg.word ? 'ruby' : seg.note ? 'note' : 'text');
    if (type === 'br' || seg.br) { passageHtml += '<div style="height:4px;"></div>'; return; }
    if (type === 'ruby' || seg.word) {
      passageHtml += `${seg.before||''}<ruby>${seg.word}<rt style="font-size:10px;color:#9A8A6A;letter-spacing:0;">${seg.ruby}</rt></ruby>${seg.after||''}`;
    } else if (type === 'note' || seg.note) {
      const noteText = seg.text || seg.note || '';
      const pos = seg.pos || seg.notePos || 'left';
      const align = pos === 'right' ? 'text-align:right;' : '';
      passageHtml += `<div style="font-size:11.5px;color:#C8443A;line-height:1.6;margin:0;${align}">${noteText}</div>`;
    } else {
      passageHtml += seg.text || '';
    }
  });
  passageHtml += '</div>';

  // 各問パーツ
  let partsHtml = '';
  let ansHtml = '';
  d.parts.forEach((p, pi) => {
    if (p.type === 'kana3') {
      const inputs = p.items.map((item, ji) =>
        `<div class="kana-item" style="min-width:260px;">
          <span class="kana-orig" style="white-space:nowrap;">${item.label}　${item.orig}</span>
          <span class="kana-arrow">→</span>
          <input class="kana-inp bp-kana" type="text" data-pi="${pi}" data-ji="${ji}" placeholder="　　　　" autocomplete="off" style="min-width:120px;flex:1;">
        </div>`
      ).join('');
      partsHtml += `<div class="mondai-title" style="margin-top:14px;">${p.label}</div>
        <div class="kana-grid" style="grid-template-columns:1fr;">${inputs}</div>`;
      ansHtml += `<div style="font-weight:700;color:#7A5A10;padding:6px 0 4px;">${p.label.replace('問','【問')+'】'}</div>`;
      p.items.forEach(item => {
        ansHtml += `<div class="a-row"><span class="a-num">${item.label}</span><span class="a-ans">${item.ans}</span><span class="a-text" style="color:#9A8A6A;font-size:12px;">（${item.orig}）</span></div>`;
      });
    } else if (p.type === 'shugo5') {
      const rows = p.items.map((item, ri) => {
        const chips = item.gogun.map(v =>
          `<button class="rel-choice bp-choice2" data-pi="${pi}" data-ri="${ri}" data-val="${v}">${v}</button>`
        ).join('');
        return `<div class="a-row" style="align-items:center;gap:8px;padding:8px 0;">
          <span class="a-num" style="min-width:20px;font-weight:700;color:#8A6A1A;">${item.label}</span>
          <span style="font-size:14px;font-weight:500;min-width:80px;">${item.verb}</span>
          <div class="rel-choice-row" style="margin:0;">${chips}</div>
        </div>`;
      }).join('');
      partsHtml += `<div class="mondai-title" style="margin-top:14px;">${p.label}</div>
        <div class="hint-box">💡 ${p.hint}</div>
        <div class="prob-items">${rows}</div>`;
      ansHtml += `<div style="font-weight:700;color:#7A5A10;padding:6px 0 4px;">${p.label.replace('問','【問')+'】'}</div>`;
      p.items.forEach(item => {
        ansHtml += `<div class="a-row"><span class="a-num">${item.label}</span>
          <span class="a-ans">${item.answer}</span>
          <span class="a-text" style="font-size:12.5px;color:#5A4A2A;">${item.note}</span></div>`;
      });
    } else if (p.type === 'choice') {
      const choices = p.gogun.map(v =>
        `<button class="rel-choice bp-choice" data-pi="${pi}" data-val="${v}">${v}</button>`
      ).join('');
      partsHtml += `<div class="mondai-title" style="margin-top:14px;">${p.label}</div>
        <div class="hint-box">💡 ${p.hint}</div>
        <div class="rel-choice-row">${choices}</div>`;
      ansHtml += `<div class="a-row" style="flex-direction:column;align-items:flex-start;gap:3px;margin-top:8px;">
        <div style="font-weight:700;color:#7A5A10;">${p.label.replace('問','【問')+'】'}</div>
        <div><strong style="color:#7A5A10;">${p.answer}</strong></div>
        <div style="font-size:12.5px;color:#5A4A2A;">${p.note}</div>
      </div>`;
    }
  });

  const html = `
    <div class="exp-box">${d.exp}</div>
    <div class="mondai-title">【問　題】次の文章を読んで，あとの問いに答えましょう。</div>
    <div style="background:#fff;border:2px solid #C8A96E;border-radius:8px;padding:1.2rem 1.4rem;margin-bottom:16px;">
      ${passageHtml}
      <div style="text-align:right;font-size:12px;color:#9A8A6A;margin-top:8px;">${d.source}</div>
    </div>
    ${partsHtml}
    <button class="check-btn" id="chk-btn">✔ 採点する</button>
    <div id="score-area"></div>
    <button class="toggle-btn" id="tog-btn">▶ 解答・解説を見る</button>
    <div class="ans-wrap" id="ans-wrap"><div class="ans-box">${ansHtml}</div></div>`;

  setTimeout(() => {
    // bp-choice（通常選択）
    document.querySelectorAll('.bp-choice').forEach(el => {
      el.addEventListener('click', () => {
        const pi = parseInt(el.dataset.pi), val = el.dataset.val;
        document.querySelectorAll(`.bp-choice[data-pi="${pi}"]`).forEach(c => c.classList.remove('sel'));
        if (bpSel[pi] === val) { bpSel[pi] = null; }
        else { bpSel[pi] = val; el.classList.add('sel'); }
      });
    });

    // bp-choice2（shugo5 行ごと選択）
    let shugoSel5 = {};
    document.querySelectorAll('.bp-choice2').forEach(el => {
      el.addEventListener('click', () => {
        const pi = parseInt(el.dataset.pi), ri = parseInt(el.dataset.ri), val = el.dataset.val;
        const key = `${pi}-${ri}`;
        document.querySelectorAll(`.bp-choice2[data-pi="${pi}"][data-ri="${ri}"]`).forEach(c => c.classList.remove('sel'));
        if (shugoSel5[key] === val) { shugoSel5[key] = null; }
        else { shugoSel5[key] = val; el.classList.add('sel'); }
      });
    });

    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0, total = 0;

      // 仮名遣い採点
      d.parts.forEach((p, pi) => {
        if (p.type !== 'kana3') return;
        p.items.forEach((item, ji) => {
          total++;
          const el = document.querySelector(`.bp-kana[data-pi="${pi}"][data-ji="${ji}"]`);
          if (!el) return;
          el.classList.remove('ok','ng');
          if (!el.value) return;
          if (el.value.trim() === item.ans) { el.classList.add('ok'); sc++; }
          else el.classList.add('ng');
        });
      });

      // 選択問題採点
      d.parts.forEach((p, pi) => {
        if (p.type !== 'choice') return;
        total++;
        const user = bpSel[pi];
        document.querySelectorAll(`.bp-choice[data-pi="${pi}"]`).forEach(c => {
          c.classList.remove('sel','ok','ng');
          if (c.dataset.val === p.answer) c.classList.add('ok');
          else if (c.dataset.val === user) c.classList.add('ng');
        });
        if (user === p.answer) sc++;
      });

      // shugo5採点
      d.parts.forEach((p, pi) => {
        if (p.type !== 'shugo5') return;
        p.items.forEach((item, ri) => {
          total++;
          const key = `${pi}-${ri}`;
          const user = shugoSel5[key];
          document.querySelectorAll(`.bp-choice2[data-pi="${pi}"][data-ri="${ri}"]`).forEach(c => {
            c.classList.remove('sel','ok','ng');
            if (c.dataset.val === item.answer) c.classList.add('ok');
            else if (c.dataset.val === user) c.classList.add('ng');
          });
          if (user === item.answer) sc++;
        });
      });

      const pct = Math.round(sc / total * 100);
      const msg = pct===100?'🎉 全問正解！完璧です！':pct>=70?'😊 よくできました！':pct>=50?'💪 もう少し！文章をもう一度読んでみよう！':'📖 本文をよく読んで解答しよう！';
      document.getElementById('score-area').innerHTML =
        `<div class="score-box">${msg}　<strong>${sc} / ${total}</strong> 問正解（${pct}点）</div>`;
    });

    document.getElementById('tog-btn').addEventListener('click', function() {
      const w = document.getElementById('ans-wrap');
      const open = w.classList.toggle('open');
      this.textContent = open ? '▼ 解答・解説を閉じる' : '▶ 解答・解説を見る';
    });
  }, 0);
  return html;
}

/* ========== KOTENKANA（歴史的仮名遣い変換） ========== */
function buildKotenKana(d) {
  // 問題１ グリッド
  const grid = d.part1.items.map((item, idx) =>
    `<div class="kana-item">
      <span class="kana-orig">${item.q}　${item.orig}</span>
      <span class="kana-arrow">→</span>
      <input class="kana-inp" type="text" data-part="1" data-idx="${idx}" placeholder="　　　" autocomplete="off">
    </div>`
  ).join('');

  // 問題２ 川柳
  const senryu = d.part2.items.map((item, idx) =>
    `<div class="senryu-card">
      <div class="senryu-num">問 ${item.q}</div>
      <div class="senryu-orig" style="color:#8A6A1A;">【原文】${item.orig}</div>
      <div style="font-size:12px;color:#9A8A6A;margin-bottom:4px;">↓ 現代仮名遣いに直した全文を入力</div>

/* ========== KATSUYOU（動詞活用表） ========== */
function buildKatsuyou(d) {
  let tables = '';
  d.verbs.forEach((verb, vi) => {
    let rows = '';
    verb.rows.forEach((row, ri) => {
      rows += `<tr>
        <td class="fixed">${verb.stem}</td>
        <td><input class="kats-input" type="text" maxlength="2" data-vi="${vi}" data-ri="${ri}" autocomplete="off" inputmode="hiragana" placeholder="　"></td>
        <td style="font-size:13px;color:#5A4A2A;">${row.after}</td>
        <td><span style="font-size:12px;color:#8A6A1A;background:#F5EDDA;padding:2px 8px;border-radius:4px;">【${row.form}】</span></td>
      </tr>`;
    });
    tables += `<div style="margin-bottom:16px;">
      <div style="font-weight:700;font-size:15px;color:#2C2C2A;margin-bottom:8px;">${verb.title}</div>
      <table class="kats-table">
        <thead><tr><th>語幹</th><th>活用語尾</th><th>続く言葉</th><th>活用形</th></tr></thead>

      `<div class="a-row"><span class="a-num">【${row.form}】</span>
      <span class="a-ans">${verb.stem + row.kana}</span>
      <span class="a-text" style="font-size:12.5px;color:#5A4A2A;">${row.after ? row.after + '　' : '（言い切り）'}</span></div>`
    ).join('')
  ).join('');

  const html = `
    <div class="exp-box">${d.exp}</div>
    <div class="mondai-title">【問　題】${d.mondai}</div>
    <div class="hint-box">💡 ${d.hint}</div>
    <div class="prob-items">${tables}</div>

    <div class="ans-wrap" id="ans-wrap"><div class="ans-box">${ansRows}</div></div>`;

  setTimeout(() => {
    document.getElementById('chk-btn').addEventListener('click', () => {
      let sc = 0, total = 0;

        verb.rows.forEach((row, ri) => {

          if (!el.value) return;
          if (el.value === row.kana) { el.classList.add('ok'); sc++; }
          else el.classList.add('ng');
        });
      });
